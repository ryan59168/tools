<!DOCTYPE html>
<html lang="zh-TW" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 即時渲染與發布編輯器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .code-font { font-family: 'Fira Code', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .editor-container:focus-within { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .drag-over-border { border: 2px dashed #3b82f6 !important; background-color: rgba(59, 130, 246, 0.05) !important; }
    </style>
</head>
<body class="h-full bg-slate-900 text-slate-100 flex flex-col overflow-hidden select-none">

    <!-- 頂部導覽列 -->
    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex flex-wrap items-center justify-between gap-4 z-10 shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <i data-lucide="cloud-lightning" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-white tracking-wide">HTML 即時渲染與發布編輯器</h1>
                <p class="text-xs text-slate-400 flex items-center gap-1">
                    <span class="inline-block w-2 h-2 rounded-full bg-amber-500 animate-pulse" id="status-pulse"></span>
                    <span id="header-status-desc">支援拖曳 HTML 解析、自訂檔名與雲端發布記錄</span>
                </p>
            </div>
        </div>

        <!-- 功能按鈕組 -->
        <div class="flex items-center space-x-2 select-none flex-wrap gap-2">
            <!-- 發布管理側欄按鈕 -->
            <button id="cloud-sidebar-btn" class="flex items-center space-x-2 bg-indigo-900/60 hover:bg-indigo-800 text-indigo-200 border border-indigo-700/50 px-3.5 py-2 rounded-lg text-sm font-medium transition">
                <i data-lucide="globe" class="w-4 h-4"></i>
                <span>發布管理</span>
            </button>
            
            <!-- 清除按鈕 -->
            <button id="clear-btn" class="flex items-center space-x-2 bg-rose-950/40 hover:bg-rose-900/60 border border-rose-800/50 text-rose-300 px-3 py-2 rounded-lg text-sm font-medium transition">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
                <span>清除全部</span>
            </button>

            <!-- 下載功能 -->
            <button id="download-btn" class="flex items-center space-x-2 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-lg shadow-blue-500/20">
                <i data-lucide="download" class="w-4 h-4"></i>
                <span id="download-btn-text">下載為 index.html</span>
            </button>
        </div>
    </header>

    <!-- 主工作區：左右分割 -->
    <main id="main-container" class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- 左側：編輯器區塊 -->
        <section id="editor-section" class="w-full md:w-[50%] h-1/2 md:h-full flex flex-col border-b md:border-b-0 border-slate-700 bg-slate-950 shrink-0 relative">
            
            <!-- 頂部資訊狀態列 -->
            <div class="bg-slate-900 px-4 py-2 border-b border-slate-800 flex items-center justify-between shrink-0 select-none">
                <div class="flex items-center space-x-2 text-xs font-semibold text-slate-400 uppercase tracking-wider overflow-hidden mr-2">
                    <i data-lucide="file-code" class="w-4 h-4 text-blue-400 shrink-0"></i>
                    <span class="truncate">來源：<span id="file-origin-badge" class="text-slate-300 font-bold bg-slate-800 px-1.5 py-0.5 rounded">直接編譯</span></span>
                </div>
                <div class="flex items-center space-x-4 text-xs text-slate-500 shrink-0">
                    <span id="filename-preview-label" class="hidden sm:inline text-blue-400/80 bg-blue-950/40 px-2 py-0.5 rounded border border-blue-900/30">預期檔名: index.html</span>
                    <span id="char-counter">字數: 0</span>
                </div>
            </div>

            <!-- 核心編輯器：行號 + 文本輸入區 -->
            <div id="editor-container" class="flex-1 flex overflow-hidden relative editor-container transition-all">
                
                <!-- 行號顯示區 -->
                <div id="line-numbers" class="w-12 bg-slate-900/50 text-slate-500 text-right pr-3 pl-1 py-4 select-none code-font text-sm leading-6 border-r border-slate-800 overflow-hidden no-scrollbar">
                    <div>1</div>
                </div>

                <!-- 程式碼輸入框 -->
                <textarea 
                    id="code-editor" 
                    class="flex-1 bg-transparent text-slate-200 code-font text-sm leading-6 p-4 outline-none resize-none overflow-y-auto w-full h-full whitespace-pre select-text"
                    placeholder="<!-- 請在此貼上您的 HTML 程式碼，或直接拖曳您的 .html 檔案至此區塊 -->&#10;"
                    spellcheck="false"
                ></textarea>

                <!-- 拖曳檔案覆蓋層 -->
                <div id="drag-drop-overlay" class="absolute inset-0 bg-slate-950/90 border-4 border-dashed border-blue-500 rounded-lg m-2 flex flex-col items-center justify-center space-y-3 opacity-0 pointer-events-none transition-all duration-200 z-30">
                    <div class="bg-blue-600/20 p-4 rounded-full text-blue-400 animate-bounce">
                        <i data-lucide="upload-cloud" class="w-10 h-10"></i>
                    </div>
                    <h3 class="text-lg font-bold text-white">放開滑鼠以匯入 HTML 檔案</h3>
                    <p class="text-xs text-slate-400">系統將自動讀取、代入行號並設定為原檔案命名版本</p>
                </div>
            </div>
        </section>

        <!-- 分割拖拉條 -->
        <div id="resizer" class="hidden md:flex items-center justify-center w-2 bg-slate-800 hover:bg-blue-600 cursor-col-resize transition-colors duration-150 z-20 shrink-0 select-none group">
            <div class="h-10 w-1 bg-slate-600 group-hover:bg-blue-200 rounded-full transition-colors duration-150"></div>
        </div>

        <!-- 右側：渲染預覽區塊 -->
        <section id="preview-section" class="w-full md:flex-1 h-1/2 md:h-full flex flex-col bg-white">
            <div class="bg-slate-900 px-4 py-2 border-b border-slate-800 flex items-center justify-between shrink-0 select-none">
                <div class="flex items-center space-x-2 text-xs font-semibold text-slate-400 uppercase tracking-wider">
                    <i data-lucide="eye" class="w-4 h-4 text-emerald-400"></i>
                    <span>即時渲染預覽</span>
                </div>
                <div class="flex items-center space-x-2">
                    <button id="fullscreen-btn" class="p-1 hover:bg-slate-800 rounded text-slate-400 hover:text-slate-200 transition" title="全螢幕預覽">
                        <i data-lucide="maximize-2" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 bg-white relative" id="preview-container">
                <iframe 
                    id="preview-iframe" 
                    class="w-full h-full border-none bg-white"
                    sandbox="allow-scripts allow-modals allow-same-origin"
                ></iframe>
            </div>
        </section>
    </main>

    <!-- 發布管理側欄 -->
    <div id="cloud-sidebar" class="fixed right-0 top-0 h-full w-full sm:w-96 bg-slate-900 border-l border-slate-700 shadow-2xl z-40 transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-5 border-b border-slate-800 bg-slate-850 flex items-center justify-between">
            <div class="flex items-center space-x-2 text-emerald-400">
                <i data-lucide="globe" class="w-5 h-5"></i>
                <h2 class="text-base font-bold text-white">發布管理</h2>
            </div>
            <button id="close-sidebar-btn" class="p-1 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white transition">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-6">

            <!-- 發布專區 -->
            <div class="p-4 bg-emerald-950/20 border border-emerald-800/40 rounded-xl space-y-3">
                <h3 class="text-xs font-semibold text-emerald-400 uppercase tracking-wider flex items-center gap-1">
                    <i data-lucide="upload-cloud" class="w-3.5 h-3.5"></i>
                    <span>發布網頁至 Firebase</span>
                </h3>
                <p class="text-xs text-slate-400">發佈後產生唯一 ID，並列於下方已發布清單。</p>

                <!-- 自訂檔名 -->
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">自訂發布檔名（選填，不填則用默認）</label>
                    <input type="text" id="publish-filename-input" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-emerald-500" placeholder="例如: my-page（不需加 .html）">
                </div>

                <button id="publish-share-btn" class="w-full flex items-center justify-center space-x-2 bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg text-sm font-semibold transition shadow-lg shadow-emerald-600/10">
                    <i data-lucide="globe" class="w-4 h-4"></i>
                    <span>發佈分享至全球</span>
                </button>

                <!-- 發布結果 -->
                <div id="share-result-container" class="hidden space-y-2 pt-2 border-t border-emerald-800/30">
                    <div class="text-xs text-emerald-300 font-medium">發佈成功！</div>
                    <div class="flex items-center space-x-1.5 bg-slate-950 rounded-lg p-2 border border-slate-800">
                        <span id="share-id-display" class="font-mono text-xs text-slate-300 flex-1 truncate select-all"></span>
                        <button id="copy-share-btn" class="p-1 hover:bg-slate-800 rounded text-slate-400 hover:text-white transition" title="複製分享網址">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 載入分享代碼 -->
            <div id="load-share-section" class="p-4 bg-slate-950 rounded-xl border border-slate-800 space-y-3">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">載入他人分享的作品</h3>
                <div class="flex gap-2">
                    <input type="text" id="share-id-input" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-2.5 py-1.5 text-xs text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500" placeholder="貼上分享識別碼 (ID) 或完整網址">
                    <button id="load-share-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-lg text-xs font-medium transition shrink-0">
                        載入
                    </button>
                </div>
            </div>

            <!-- 已發布清單 -->
            <div class="space-y-3">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider flex justify-between items-center">
                    <span>已發布的網頁</span>
                    <button id="refresh-published-btn" class="text-slate-500 hover:text-emerald-400 transition" title="重新整理">
                        <i data-lucide="rotate-cw" class="w-3.5 h-3.5"></i>
                    </button>
                </h3>
                <div id="published-list-container" class="space-y-2 max-h-80 overflow-y-auto pr-1">
                    <div class="text-center py-6 text-slate-500 text-xs">載入中...</div>
                </div>
            </div>

        </div>

        <!-- 底部關閉按鈕（確保任何狀態下都能關閉側欄） -->
        <div class="p-4 border-t border-slate-800 shrink-0">
            <button id="close-sidebar-footer-btn" class="w-full flex items-center justify-center space-x-2 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white py-2 rounded-lg text-sm font-medium transition">
                <i data-lucide="x" class="w-4 h-4"></i>
                <span>關閉視窗</span>
            </button>
        </div>
    </div>

    <!-- 浮動提示框 (Toast) -->
    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 bg-slate-800 border border-slate-700 text-slate-100 px-4 py-3 rounded-lg shadow-2xl flex items-center space-x-3 transition-all duration-300 z-50 select-none">
        <div id="toast-icon-bg" class="p-1.5 rounded-md bg-emerald-500/20 text-emerald-400">
            <i id="toast-icon" data-lucide="check" class="w-5 h-5"></i>
        </div>
        <span id="toast-message" class="text-sm font-medium">提示訊息</span>
    </div>

    <!-- 全螢幕預覽模態框 -->
    <div id="fullscreen-modal" class="fixed inset-0 bg-black z-50 hidden flex-col select-none">
        <div class="bg-slate-900 px-6 py-3 flex items-center justify-between border-b border-slate-800">
            <span class="text-sm font-semibold text-slate-300 flex items-center space-x-2">
                <i data-lucide="eye" class="w-4 h-4 text-emerald-400"></i>
                <span>全螢幕預覽模式</span>
            </span>
            <button id="close-fullscreen-btn" class="bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white px-3 py-1.5 rounded-lg text-xs font-medium flex items-center space-x-1 transition">
                <i data-lucide="minimize-2" class="w-3.5 h-3.5"></i>
                <span>退出全螢幕</span>
            </button>
        </div>
        <div class="flex-1 bg-white" id="modal-iframe-container"></div>
    </div>

    <!-- 自訂檔名彈窗（下載用） -->
    <div id="download-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4 select-none">
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 max-w-sm w-full shadow-2xl">
            <div class="flex items-center space-x-3 text-blue-400 mb-4">
                <div class="bg-blue-500/10 p-2 rounded-lg">
                    <i data-lucide="download" class="w-6 h-6"></i>
                </div>
                <h3 class="text-lg font-bold text-white">下載設定</h3>
            </div>
            <p class="text-sm text-slate-400 mb-3">輸入自訂檔名（不需加 .html），留空則使用默認。</p>
            <input type="text" id="download-filename-input" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-blue-500 mb-4" placeholder="例如: my-page（默認: index）">
            <div class="flex justify-end space-x-3">
                <button id="cancel-download-btn" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg text-sm font-medium transition">取消</button>
                <button id="confirm-download-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-medium transition shadow-lg shadow-blue-600/20">下載</button>
            </div>
        </div>
    </div>

    <!-- 全域通用二次確認彈窗 -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4 select-none">
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 max-w-sm w-full shadow-2xl">
            <div class="flex items-center space-x-3 text-rose-400 mb-4">
                <div class="bg-rose-500/10 p-2 rounded-lg">
                    <i data-lucide="alert-triangle" class="w-6 h-6" id="confirm-modal-icon"></i>
                </div>
                <h3 class="text-lg font-bold text-white" id="confirm-modal-title">確定動作嗎？</h3>
            </div>
            <p class="text-sm text-slate-300 mb-6" id="confirm-modal-desc">此動作即將執行，請確認是否繼續。</p>
            <div class="flex justify-end space-x-3">
                <button id="cancel-clear-btn" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg text-sm font-medium transition">取消</button>
                <button id="confirm-clear-btn" class="px-4 py-2 bg-rose-600 hover:bg-rose-500 text-white rounded-lg text-sm font-medium transition shadow-lg shadow-rose-600/20">確定</button>
            </div>
        </div>
    </div>

    <!-- 載入 Firebase 資源 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 設定
        // ==========================================
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyD8ItxQwp5f5s7cwI-bE9pH1yLl66O8uXA",
            authDomain: "my-html-editor-15a7e.firebaseapp.com",
            projectId: "my-html-editor-15a7e",
            storageBucket: "my-html-editor-15a7e.firebasestorage.app",
            messagingSenderId: "1059258243874",
            appId: "1:1059258243874:web:869c7b236c73898c43637b",
            measurementId: "G-MX0885D70P"
        };

        // ==========================================
        // 全域狀態
        // ==========================================
        let db = null;
        let auth = null;
        let currentUser = null;
        let appId = 'html-realtime-editor';
        let originalFileName = "";
        let activeConfirmAction = null;

        // ==========================================
        // DOM 元素
        // ==========================================
        const codeEditor = document.getElementById('code-editor');
        const lineNumbers = document.getElementById('line-numbers');
        const previewIframe = document.getElementById('preview-iframe');
        const downloadBtn = document.getElementById('download-btn');
        const downloadBtnText = document.getElementById('download-btn-text');
        const clearBtn = document.getElementById('clear-btn');
        const charCounter = document.getElementById('char-counter');
        const fileOriginBadge = document.getElementById('file-origin-badge');
        const filenamePreviewLabel = document.getElementById('filename-preview-label');

        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const fullscreenModal = document.getElementById('fullscreen-modal');
        const closeFullscreenBtn = document.getElementById('close-fullscreen-btn');
        const modalIframeContainer = document.getElementById('modal-iframe-container');

        const mainContainer = document.getElementById('main-container');
        const editorSection = document.getElementById('editor-section');
        const resizer = document.getElementById('resizer');

        const confirmModal = document.getElementById('confirm-modal');
        const cancelClearBtn = document.getElementById('cancel-clear-btn');
        const confirmClearBtn = document.getElementById('confirm-clear-btn');
        const confirmModalTitle = document.getElementById('confirm-modal-title');
        const confirmModalDesc = document.getElementById('confirm-modal-desc');

        const editorContainer = document.getElementById('editor-container');
        const dragDropOverlay = document.getElementById('drag-drop-overlay');

        const cloudSidebarBtn = document.getElementById('cloud-sidebar-btn');
        const cloudSidebar = document.getElementById('cloud-sidebar');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const closeSidebarFooterBtn = document.getElementById('close-sidebar-footer-btn');
        const publishShareBtn = document.getElementById('publish-share-btn');
        const shareResultContainer = document.getElementById('share-result-container');
        const shareIdDisplay = document.getElementById('share-id-display');
        const copyShareBtn = document.getElementById('copy-share-btn');
        const shareIdInput = document.getElementById('share-id-input');
        const loadShareBtn = document.getElementById('load-share-btn');
        const publishedListContainer = document.getElementById('published-list-container');
        const refreshPublishedBtn = document.getElementById('refresh-published-btn');
        const publishFilenameInput = document.getElementById('publish-filename-input');

        const downloadModal = document.getElementById('download-modal');
        const downloadFilenameInput = document.getElementById('download-filename-input');
        const confirmDownloadBtn = document.getElementById('confirm-download-btn');
        const cancelDownloadBtn = document.getElementById('cancel-download-btn');

        // ==========================================
        // 核心一：初始化與檔案命名控制
        // ==========================================

        function updateFilenameUI(name = "") {
            if (name) {
                const extension = name.split('.').pop();
                const baseName = name.replace(/\.[^/.]+$/, "");
                originalFileName = baseName;
                fileOriginBadge.textContent = name;
                fileOriginBadge.className = "text-blue-200 font-bold bg-blue-900/40 border border-blue-800 px-1.5 py-0.5 rounded truncate max-w-[200px]";
                filenamePreviewLabel.textContent = `預期檔名: ${baseName}_1.${extension}`;
                filenamePreviewLabel.classList.remove('hidden');
                downloadBtnText.textContent = `下載 HTML`;
            } else {
                originalFileName = "";
                fileOriginBadge.textContent = "直接編譯";
                fileOriginBadge.className = "text-slate-300 font-bold bg-slate-800 px-1.5 py-0.5 rounded";
                filenamePreviewLabel.textContent = `預期檔名: index.html`;
                downloadBtnText.textContent = `下載為 index.html`;
            }
        }

        // ==========================================
        // 核心二：拖曳 HTML 檔案上傳解析功能
        // ==========================================

        window.addEventListener('dragover', (e) => e.preventDefault(), false);
        window.addEventListener('drop', (e) => e.preventDefault(), false);

        editorContainer.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragDropOverlay.classList.remove('opacity-0');
            dragDropOverlay.classList.add('opacity-100');
        });

        editorContainer.addEventListener('dragover', (e) => { e.preventDefault(); });

        editorContainer.addEventListener('dragleave', (e) => {
            e.preventDefault();
            if (e.relatedTarget === null || !editorContainer.contains(e.relatedTarget)) {
                dragDropOverlay.classList.add('opacity-0');
                dragDropOverlay.classList.remove('opacity-100');
            }
        });

        editorContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            dragDropOverlay.classList.add('opacity-0');
            dragDropOverlay.classList.remove('opacity-100');

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                const lowerName = file.name.toLowerCase();
                if (lowerName.endsWith('.html') || lowerName.endsWith('.htm')) {
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        codeEditor.value = evt.target.result;
                        updateFilenameUI(file.name);
                        updateLineNumbers();
                        renderHTML();
                        showToast(`成功匯入檔案：${file.name}`);
                    };
                    reader.readAsText(file);
                } else {
                    showToast('不支援的檔案格式，請拖放 .html 或 .htm 檔案！', 'error');
                }
            }
        });

        // ==========================================
        // 核心三：Firebase 雲端連線
        // ==========================================

        const initFirebase = async () => {
            appId = typeof __app_id !== 'undefined' ? __app_id : 'html-realtime-editor';

            try {
                const app = initializeApp(FIREBASE_CONFIG);
                auth = getAuth(app);
                db = getFirestore(app);

                await signInAnonymously(auth).catch(err => {
                    throw new Error("AUTH_DENIED: " + err.message);
                });

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        fetchPublishedList();
                        checkHashAndLoad();
                    }
                });

            } catch (error) {
                console.error("Firebase 連線錯誤:", error);
                showToast("雲端連線失敗，請檢查網路", "error");
                publishedListContainer.innerHTML = `<div class="text-center py-6 text-rose-400 text-xs">雲端連線失敗</div>`;
            }
        };

        // ==========================================
        // 核心五：發布功能
        // ==========================================

        async function publishShare() {
            if (!currentUser || !db) {
                showToast("雲端連線未就緒！", "error");
                return;
            }

            const content = codeEditor.value;
            if (!content.trim()) {
                showToast("目前無程式碼可供發佈！", "error");
                return;
            }

            const customName = publishFilenameInput.value.trim();
            const fileName = customName || originalFileName || "index";

            try {
                const shareCol = collection(db, 'artifacts', appId, 'public', 'data', 'shares');
                const docRef = await addDoc(shareCol, {
                    content: content,
                    fileName: fileName,
                    publishedAt: new Date().toISOString()
                });

                const publishDate = new Date().toLocaleDateString('zh-TW');

                shareResultContainer.classList.remove('hidden');
                shareIdDisplay.textContent = docRef.id;
                window.location.hash = `share-${docRef.id}`;
                publishFilenameInput.value = "";

                showToast("網頁已成功發佈！");
                fetchPublishedList();
            } catch (error) {
                console.error("Publish Error:", error);
                showToast("發佈失敗，請重試", "error");
            }
        }

        // ==========================================
        // 核心六：取消發布功能
        // ==========================================

        async function unpublishShare(shareId) {
            triggerConfirmModal(
                "下架並撤銷此公開網頁？",
                "點擊確定後，此網頁會從雲端永久刪除，原先分享連結將立刻失效！",
                "下架網頁",
                async () => {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'shares', shareId);
                        await deleteDoc(docRef);

                        // 若目前顯示結果是同一個 ID，也隱藏
                        if (shareIdDisplay.textContent === shareId) {
                            shareResultContainer.classList.add('hidden');
                            shareIdDisplay.textContent = "";
                            window.location.hash = "";
                        }

                        showToast("已成功下架！");
                        fetchPublishedList();
                    } catch (error) {
                        console.error("Unpublish Error:", error);
                        showToast("撤銷失敗，請檢查網路連線", "error");
                    }
                }
            );
        }

        // ==========================================
        // 核心七：讀取已發布清單
        // ==========================================

        async function fetchPublishedList() {
            if (!currentUser || !db) return;
            publishedListContainer.innerHTML = `<div class="text-center py-4 text-slate-500 text-xs">載入中...</div>`;

            try {
                const shareCol = collection(db, 'artifacts', appId, 'public', 'data', 'shares');
                const snapshot = await getDocs(shareCol);

                let items = [];
                snapshot.forEach((d) => {
                    items.push({ id: d.id, ...d.data() });
                });

                items.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
                renderPublishedList(items);
            } catch (error) {
                console.error("Fetch Published Error:", error);
                publishedListContainer.innerHTML = `<div class="text-center py-4 text-rose-400 text-xs">讀取失敗</div>`;
            }
        }

        function renderPublishedList(items) {
            if (items.length === 0) {
                publishedListContainer.innerHTML = `<div class="text-center py-6 text-slate-500 text-xs">尚無任何已發布的網頁。</div>`;
                return;
            }

            publishedListContainer.innerHTML = items.map(item => {
                const date = item.publishedAt
                    ? new Date(item.publishedAt).toLocaleString('zh-TW', { hour12: false, month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })
                    : '未知時間';
                const shareUrl = `${window.location.origin}${window.location.pathname}#share-${item.id}`;
                return `
                    <div class="bg-slate-950 p-3 rounded-lg border border-slate-800 hover:border-emerald-500/40 transition duration-150 space-y-2">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-bold text-slate-200 truncate pr-2 max-w-[160px]">${escapeHTML(item.fileName || 'index')}.html</span>
                            <span class="text-[10px] text-slate-500 shrink-0">${date}</span>
                        </div>
                        <div class="font-mono text-[10px] text-slate-500 truncate select-all bg-slate-900 px-2 py-1 rounded">${item.id}</div>
                        <div class="flex items-center space-x-2">
                            <button onclick="window.copyPublishedUrl('${shareUrl}')" class="flex-1 flex items-center justify-center gap-1 text-[11px] text-blue-400 hover:text-blue-300 bg-blue-950/30 hover:bg-blue-950/50 border border-blue-900/40 py-1 rounded transition">
                                <i data-lucide="copy" class="w-3 h-3"></i> 複製連結
                            </button>
                            <button onclick="window.loadPublishedItem('${item.id}')" class="flex-1 flex items-center justify-center gap-1 text-[11px] text-indigo-400 hover:text-indigo-300 bg-indigo-950/30 hover:bg-indigo-950/50 border border-indigo-900/40 py-1 rounded transition">
                                <i data-lucide="folder-open" class="w-3 h-3"></i> 載入
                            </button>
                            <button onclick="window.unpublishItem('${item.id}')" class="flex-1 flex items-center justify-center gap-1 text-[11px] text-rose-400 hover:text-rose-300 bg-rose-950/30 hover:bg-rose-950/50 border border-rose-900/40 py-1 rounded transition">
                                <i data-lucide="trash-2" class="w-3 h-3"></i> 取消發布
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();
        }

        // 暴露給 inline onclick
        window.copyPublishedUrl = function(url) {
            const tempInput = document.createElement('input');
            tempInput.value = url;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            showToast("分享連結已複製！");
        };

        window.unpublishItem = function(id) {
            unpublishShare(id);
        };

        window.loadPublishedItem = async function(id) {
            if (!db) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'shares', id);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    codeEditor.value = data.content;
                    updateFilenameUI(data.fileName ? `${data.fileName}.html` : "");
                    updateLineNumbers();
                    renderHTML();
                    cloudSidebar.classList.add('translate-x-full');
                    showToast(`已載入：${data.fileName || 'index'}.html`);
                }
            } catch (e) {
                showToast("載入失敗！", "error");
            }
        };

        // ==========================================
        // 載入分享代碼
        // ==========================================

        async function loadSharedDocument(shareId) {
            if (!db) {
                showToast("雲端服務未啟動！", "error");
                return;
            }

            let cleanId = shareId.trim();
            if (!cleanId) {
                showToast("請輸入正確的分享識別碼！", "error");
                return;
            }

            const hashMatch = cleanId.match(/share-([a-zA-Z0-9_-]+)/);
            if (hashMatch) {
                cleanId = hashMatch[1];
            } else if (cleanId.includes('/')) {
                cleanId = cleanId.split('/').pop().split('#')[0].split('?')[0];
            }

            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'shares', cleanId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    codeEditor.value = data.content;
                    updateFilenameUI(data.fileName ? `${data.fileName}.html` : "");
                    updateLineNumbers();
                    renderHTML();
                    showToast("已成功同步載入雲端分享的作品！");
                    window.location.hash = `share-${cleanId}`;
                } else {
                    showToast("找不到該分享識別碼，可能已被撤銷下架或代碼有誤！", "error");
                }
            } catch (error) {
                console.error("Load Shared Doc Error:", error);
                showToast("獲取分享內容失敗！請檢查代碼或網路。", "error");
            }
        }

        function checkHashAndLoad() {
            const hash = window.location.hash;
            if (hash && hash.includes('share-')) {
                const match = hash.match(/share-([a-zA-Z0-9_-]+)/);
                const shareId = match ? match[1] : hash.replace('#share-', '');
                showToast("檢測到分享連結，正在從雲端載入網頁...");
                setTimeout(() => { loadSharedDocument(shareId); }, 500);
            }
        }

        // ==========================================
        // 核心八：其他介面互動邏輯
        // ==========================================

        // 拖曳調整左右比例
        let isDragging = false;
        resizer.addEventListener('mousedown', function(e) {
            e.preventDefault();
            isDragging = true;
            previewIframe.style.pointerEvents = 'none';
            document.body.classList.add('cursor-col-resize');
            resizer.classList.remove('bg-slate-800');
            resizer.classList.add('bg-blue-500');
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });

        function onMouseMove(e) {
            if (!isDragging) return;
            const containerWidth = mainContainer.clientWidth;
            const containerOffsetLeft = mainContainer.getBoundingClientRect().left;
            const pointerRelativeX = e.clientX - containerOffsetLeft;
            let newWidthPercent = (pointerRelativeX / containerWidth) * 100;
            if (newWidthPercent < 15) newWidthPercent = 15;
            if (newWidthPercent > 85) newWidthPercent = 85;
            editorSection.style.width = `${newWidthPercent}%`;
        }

        function onMouseUp() {
            if (!isDragging) return;
            isDragging = false;
            previewIframe.style.pointerEvents = 'auto';
            document.body.classList.remove('cursor-col-resize');
            resizer.classList.remove('bg-blue-500');
            resizer.classList.add('bg-slate-800');
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        }

        // 更新行號
        function updateLineNumbers() {
            const lines = codeEditor.value.split('\n');
            let lineHTML = '';
            for (let i = 1; i <= lines.length; i++) {
                lineHTML += `<div>${i}</div>`;
            }
            lineNumbers.innerHTML = lineHTML;
        }

        // 同步滾動
        codeEditor.addEventListener('scroll', () => {
            lineNumbers.scrollTop = codeEditor.scrollTop;
        });

        // 渲染預覽
        function renderHTML() {
            const htmlContent = codeEditor.value;
            charCounter.textContent = `字數: ${htmlContent.length}`;

            const iframeDoc = previewIframe.contentDocument || previewIframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(htmlContent);
            iframeDoc.close();

            const modalIframe = document.getElementById('modal-preview-iframe');
            if (modalIframe) {
                const modalIframeDoc = modalIframe.contentDocument || modalIframe.contentWindow.document;
                modalIframeDoc.open();
                modalIframeDoc.write(htmlContent);
                modalIframeDoc.close();
            }
        }

        // 下載 HTML 檔案（帶自訂檔名彈窗）
        downloadBtn.addEventListener('click', () => {
            const code = codeEditor.value;
            if (!code.trim()) {
                showToast('請先輸入、貼上或拖曳 HTML 程式碼！', 'error');
                return;
            }
            downloadFilenameInput.value = "";
            downloadModal.classList.remove('hidden');
            downloadModal.classList.add('flex');
            downloadFilenameInput.focus();
        });

        cancelDownloadBtn.addEventListener('click', () => {
            downloadModal.classList.add('hidden');
            downloadModal.classList.remove('flex');
        });

        confirmDownloadBtn.addEventListener('click', () => {
            const code = codeEditor.value;
            const customName = downloadFilenameInput.value.trim();
            const downloadName = customName
                ? `${customName}.html`
                : (originalFileName ? `${originalFileName}_1.html` : 'index.html');

            const blob = new Blob([code], { type: 'text/html;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = downloadName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            downloadModal.classList.add('hidden');
            downloadModal.classList.remove('flex');
            showToast(`成功下載為 ${downloadName}！`);
        });

        // Tab 空格替換
        codeEditor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = codeEditor.selectionStart;
                const end = codeEditor.selectionEnd;
                codeEditor.value = codeEditor.value.substring(0, start) + "    " + codeEditor.value.substring(end);
                codeEditor.selectionStart = codeEditor.selectionEnd = start + 4;
                updateLineNumbers();
                renderHTML();
            }
        });

        // 全螢幕預覽
        fullscreenBtn.addEventListener('click', () => {
            modalIframeContainer.innerHTML = `<iframe id="modal-preview-iframe" class="w-full h-full border-none bg-white" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>`;
            fullscreenModal.classList.remove('hidden');
            fullscreenModal.classList.add('flex');

            const htmlContent = codeEditor.value;
            const modalIframe = document.getElementById('modal-preview-iframe');
            const modalIframeDoc = modalIframe.contentDocument || modalIframe.contentWindow.document;
            modalIframeDoc.open();
            modalIframeDoc.write(htmlContent);
            modalIframeDoc.close();
        });

        closeFullscreenBtn.addEventListener('click', () => {
            fullscreenModal.classList.remove('flex');
            fullscreenModal.classList.add('hidden');
            modalIframeContainer.innerHTML = '';
        });

        // 監聽輸入即時渲染
        codeEditor.addEventListener('input', () => {
            updateLineNumbers();
            renderHTML();
        });

        // 側邊欄控制
        cloudSidebarBtn.addEventListener('click', () => {
            cloudSidebar.classList.remove('translate-x-full');
        });

        closeSidebarBtn.addEventListener('click', () => {
            cloudSidebar.classList.add('translate-x-full');
        });

        closeSidebarFooterBtn.addEventListener('click', () => {
            cloudSidebar.classList.add('translate-x-full');
        });

        // 發布按鈕
        publishShareBtn.addEventListener('click', publishShare);

        // 刷新已發布清單
        refreshPublishedBtn.addEventListener('click', fetchPublishedList);

        // 複製發布 ID 按鈕
        copyShareBtn.addEventListener('click', () => {
            const shareId = shareIdDisplay.textContent;
            if (shareId) {
                const textToCopy = `${window.location.origin}${window.location.pathname}#share-${shareId}`;
                const tempInput = document.createElement('input');
                tempInput.value = textToCopy;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand('copy');
                document.body.removeChild(tempInput);
                showToast("專屬雲端分享網址已複製到剪貼簿！");
            }
        });

        // 載入分享代碼
        loadShareBtn.addEventListener('click', () => {
            loadSharedDocument(shareIdInput.value);
            shareIdInput.value = "";
        });

        // 二次確認清除編輯器
        clearBtn.addEventListener('click', () => {
            triggerConfirmModal(
                "確定要清空嗎？",
                "此動作將會清除左側編輯器中所有的程式碼，且無法復原。",
                "確定清空",
                () => {
                    codeEditor.value = '';
                    updateFilenameUI("");
                    updateLineNumbers();
                    renderHTML();
                    showToast('編輯器已清空');
                }
            );
        });

        // 確認彈窗邏輯
        function triggerConfirmModal(title, desc, confirmButtonText, actionToExecute) {
            confirmModalTitle.textContent = title;
            confirmModalDesc.textContent = desc;
            confirmClearBtn.textContent = confirmButtonText;
            activeConfirmAction = actionToExecute;
            confirmModal.classList.remove('hidden');
            confirmModal.classList.add('flex');
        }

        function closeConfirmModal() {
            confirmModal.classList.add('hidden');
            confirmModal.classList.remove('flex');
            activeConfirmAction = null;
        }

        confirmClearBtn.addEventListener('click', () => {
            if (activeConfirmAction) activeConfirmAction();
            closeConfirmModal();
        });

        cancelClearBtn.addEventListener('click', closeConfirmModal);

        // 輔助函式
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            const iconBg = document.getElementById('toast-icon-bg');
            const icon = document.getElementById('toast-icon');

            toastMessage.textContent = message;

            if (type === 'success') {
                iconBg.className = "p-1.5 rounded-md bg-emerald-500/20 text-emerald-400";
                icon.setAttribute('data-lucide', 'check');
            } else {
                iconBg.className = "p-1.5 rounded-md bg-rose-500/20 text-rose-400";
                icon.setAttribute('data-lucide', 'alert-circle');
            }
            lucide.createIcons();

            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 4000);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g,
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // 初始化載入
        window.addEventListener('DOMContentLoaded', () => {
            codeEditor.value = "";
            updateFilenameUI("");
            updateLineNumbers();
            renderHTML();
            initFirebase();
        });
    </script>
</body>
</html>
