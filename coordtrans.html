<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺灣常用座標批次轉換工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
    <style>
        .custom-marker-node {
            background-color: #ef4444;
            border: 2px solid #ffffff;
            border-radius: 50%;
            color: #ffffff;
            font-weight: bold;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: all 0.15s ease-in-out;
        }
        .custom-marker-node:hover, .custom-marker-node.active-marker {
            background-color: #2563eb;
            transform: scale(1.15);
            z-index: 1000 !important;
        }
        .leaflet-marker-icon:focus {
            outline: none;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans h-screen flex flex-col overflow-hidden">

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <div class="flex-1 h-[40vh] md:h-full relative">
            <div id="map" class="w-full h-full"></div>
            
            <div class="absolute top-4 left-14 z-[1000] flex space-x-2">
                <button id="btn-measure" onclick="toggleMeasure()" class="bg-white hover:bg-slate-50 text-slate-700 font-bold px-3 py-1.5 rounded shadow text-xs flex items-center space-x-1 border border-slate-200">
                    <span>📏 測量距離</span>
                </button>
                <button id="btn-streetview" onclick="toggleStreetViewMode()" class="bg-white hover:bg-slate-50 text-slate-700 font-bold px-3 py-1.5 rounded shadow text-xs flex items-center space-x-1 border border-slate-200">
                    <span>🛣️ 點選街景</span>
                </button>
            </div>

            <div id="measure-output-box" class="hidden absolute top-14 left-14 z-[1000] bg-white/95 border border-slate-200 p-2.5 rounded shadow text-xs text-slate-800 space-y-1">
                <div class="font-bold border-b pb-1 mb-1">測量結果</div>
                <div>總距離: <span id="measure-distance" class="font-mono font-bold text-blue-600">0</span></div>
                <button onclick="resetMeasure()" class="text-[10px] text-red-600 hover:underline block mt-1">清除測量</button>
            </div>
        </div>

        <div class="w-full md:w-[420px] bg-white border-t md:border-t-0 md:border-l border-slate-200 flex flex-col h-[60vh] md:h-full overflow-hidden shadow-xl z-[1000]">
            
            <div class="bg-slate-900 text-white px-5 py-4 shrink-0 shadow-md">
                <h1 class="text-lg font-bold tracking-wide text-center">臺灣常用座標批次轉換工具</h1>
            </div>

            <div class="flex-1 overflow-y-auto p-5 space-y-4">
                
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">來源座標系統</label>
                    <select id="source-system" onchange="updatePlaceholder()" class="w-full bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs text-slate-800 focus:outline-none focus:ring-1 focus:ring-blue-500">
                        <option value="WGS84_LNG_LAT" selected>WGS84 經緯度 (經度 Lng, 緯度 Lat)</option>
                        <option value="WGS84_LAT_LNG">WGS84 經緯度 (緯度 Lat, 經度 Lng)</option>
                        <option value="TWD97_EN">TWD97 二度分帶 (X Easting, Y Northing)</option>
                        <option value="TWD97_NE">TWD97 二度分帶 (Y Northing, X Easting)</option>
                    </select>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs font-bold text-slate-700">輸入格式 X,Y (支援 Excel 直接貼上)</label>
                        <button onclick="clearAllData()" class="text-[11px] text-red-600 hover:underline font-medium">清除資料</button>
                    </div>
                    <textarea id="coord-input" rows="5" class="w-full font-mono text-xs border border-slate-300 rounded p-2 focus:outline-none focus:ring-1 focus:ring-blue-500 bg-slate-50" placeholder=""></textarea>
                </div>

                <div class="pt-2 border-t border-slate-100">
                    <label class="block text-xs font-bold text-slate-700 mb-1">目標座標系統</label>
                    <div class="flex space-x-2">
                        <select id="target-system" class="flex-1 bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs text-slate-800 focus:outline-none focus:ring-1 focus:ring-blue-500">
                            <option value="TWD97_EN" selected>TWD97 二度分帶 (X Easting, Y Northing)</option>
                            <option value="TWD97_NE">TWD97 二度分帶 (Y Northing, X Easting)</option>
                            <option value="WGS84_LNG_LAT">WGS84 經緯度 (經度 Lng, 緯度 Lat)</option>
                            <option value="WGS84_LAT_LNG">WGS84 經緯度 (緯度 Lat, 經度 Lng)</option>
                        </select>
                        <button onclick="processCoords()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-1.5 rounded text-xs transition-colors">
                            轉換
                        </button>
                    </div>
                </div>

                <div>
                    <textarea id="coord-output" rows="5" readonly class="w-full font-mono text-xs border border-slate-300 rounded p-2 bg-slate-50 text-red-600 focus:outline-none" placeholder="轉換後座標將顯示於此..."></textarea>
                    <p class="text-[10px] text-slate-500 mt-1 text-center">結果會自動貼至剪貼簿 (轉換誤差約1米)</p>
                </div>

                <div id="list-container" class="hidden border border-slate-200 rounded overflow-hidden">
                    <div class="bg-slate-100 px-3 py-2 text-xs font-bold text-slate-700 border-b border-slate-200">
                        點位清單 (點擊可於地圖定位)
                    </div>
                    <div id="point-list" class="max-h-[160px] overflow-y-auto divide-y divide-slate-100 bg-white">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 pt-2">
                    <button onclick="exportCSV()" class="border border-slate-300 hover:bg-slate-50 text-slate-700 text-xs font-medium py-2 rounded transition-all text-center">
                        下載 CSV
                    </button>
                    <button onclick="exportKML()" class="border border-slate-300 hover:bg-slate-50 text-slate-700 text-xs font-medium py-2 rounded transition-all text-center">
                        下載 KML
                    </button>
                </div>

            </div>

            <footer class="bg-slate-100 py-2.5 border-t border-slate-200 text-center text-[10px] text-slate-400 shrink-0">
                <p>© Google Map | Map data &copy; Google</p>
            </footer>
        </div>
    </main>

    <div id="streetview-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-2xl w-[95vw] h-[95vh] flex flex-col overflow-hidden">
            <div class="bg-slate-900 text-white px-4 py-3 flex items-center justify-between">
                <span class="text-sm font-bold">Google 街景服務</span>
                <button onclick="closeStreetView()" class="text-slate-400 hover:text-white text-lg font-bold">✕</button>
            </div>
            <div class="flex-1 bg-black">
                <iframe id="streetview-iframe" class="w-full h-full border-0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-4 py-2 rounded shadow-lg text-xs font-medium z-[9999] transition-all transform translate-y-[-100px] opacity-0">
        提示
    </div>

    <script>
        proj4.defs([
            ["EPSG:4326", "+proj=longlat +datum=WGS84 +no_defs"],
            ["TWD97", "+proj=tmerc +lat_0=0 +lon_0=121 +k=0.9999 +x_0=250000 +y_0=0 +ellps=GRS80 +units=m +no_defs"]
        ]);

        let map;
        let markersLayer;
        let points = [];
        let googleRoadmap;
        let googleSatellite;
        let markersMap = {};
        let activeTargetLabel = "目標座標值";

        let isMeasuring = false;
        let measurePoints = [];
        let measureLine = null;
        let measureMarkers = [];

        let isStreetViewActive = false;

        const placeholders = {
            'WGS84_LNG_LAT': '121.2180325,25.04836996',
            'WGS84_LAT_LNG': '25.04836996,121.2180325',
            'TWD97_EN': '271999.610,2771152.848',
            'TWD97_NE': '2771152.848,271999.610'
        };

        function updatePlaceholder() {
            const sys = document.getElementById('source-system').value;
            const input = document.getElementById('coord-input');
            input.placeholder = `範例格式：\n${placeholders[sys]}`;
        }

        function init() {
            googleRoadmap = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 21,
                attribution: 'Map data &copy; Google'
            });

            googleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                maxZoom: 21,
                attribution: 'Map data &copy; Google'
            });

            map = L.map('map', {
                center: [23.973875, 120.982024],
                zoom: 8,
                layers: [googleRoadmap]
            });

            const baseMaps = {
                "Google 地圖": googleRoadmap,
                "Google 衛星影像": googleSatellite
            };

            L.control.layers(baseMaps).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
            updatePlaceholder();
        }

        function clearAllData() {
            document.getElementById('coord-input').value = '';
            document.getElementById('coord-output').value = '';
            markersLayer.clearLayers();
            points = [];
            markersMap = {};
            document.getElementById('list-container').classList.add('hidden');
            document.getElementById('point-list').innerHTML = '';
            resetMeasure();
            if (isStreetViewActive) toggleStreetViewMode();
            map.setView([23.973875, 120.982024], 8);
            showToast('所有輸入、轉換資料與標記已清除！');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.remove('translate-y-[-100px]', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-[-100px]', 'opacity-0');
            }, 2500);
        }

        function focusPoint(id, lng, lat) {
            map.setView([lat, lng], 16);
            const marker = markersMap[id];
            if (marker) {
                marker.openPopup();
            }
            
            document.querySelectorAll('.custom-marker-node').forEach(el => {
                el.classList.remove('active-marker');
            });
            const node = document.getElementById(`node-${id}`);
            if (node) {
                node.classList.add('active-marker');
            }
        }

        function toggleMeasure() {
            if (isStreetViewActive) toggleStreetViewMode();
            isMeasuring = !isMeasuring;
            const btn = document.getElementById('btn-measure');
            if (isMeasuring) {
                btn.classList.add('bg-blue-50', 'border-blue-500', 'text-blue-600');
                document.getElementById('map').style.cursor = 'crosshair';
                map.on('click', handleMeasureClick);
                document.getElementById('measure-output-box').classList.remove('hidden');
            } else {
                btn.classList.remove('bg-blue-50', 'border-blue-500', 'text-blue-600');
                document.getElementById('map').style.cursor = '';
                map.off('click', handleMeasureClick);
                if (measurePoints.length === 0) {
                    document.getElementById('measure-output-box').classList.add('hidden');
                }
            }
        }

        function handleMeasureClick(e) {
            const latlng = e.latlng;
            measurePoints.push(latlng);

            const marker = L.circleMarker(latlng, {
                radius: 5,
                color: '#2563eb',
                fillColor: '#ffffff',
                fillOpacity: 1,
                weight: 2
            }).addTo(map);
            measureMarkers.push(marker);

            if (measurePoints.length > 1) {
                if (measureLine) {
                    map.removeLayer(measureLine);
                }
                measureLine = L.polyline(measurePoints, {
                    color: '#2563eb',
                    weight: 3,
                    dashArray: '5, 8'
                }).addTo(map);

                let totalDist = 0;
                for (let i = 0; i < measurePoints.length - 1; i++) {
                    totalDist += measurePoints[i].distanceTo(measurePoints[i+1]);
                }

                const distText = totalDist > 1000 ? `${(totalDist / 1000).toFixed(2)} 公里` : `${totalDist.toFixed(1)} 公尺`;
                document.getElementById('measure-distance').textContent = distText;
            }
        }

        function resetMeasure() {
            measurePoints = [];
            if (measureLine) {
                map.removeLayer(measureLine);
                measureLine = null;
            }
            measureMarkers.forEach(m => map.removeLayer(m));
            measureMarkers = [];
            document.getElementById('measure-distance').textContent = '0';
            document.getElementById('measure-output-box').classList.add('hidden');
            if (isMeasuring) {
                toggleMeasure();
            }
        }

        function toggleStreetViewMode() {
            if (isMeasuring) resetMeasure();
            isStreetViewActive = !isStreetViewActive;
            const btn = document.getElementById('btn-streetview');
            if (isStreetViewActive) {
                btn.classList.add('bg-blue-50', 'border-blue-500', 'text-blue-600');
                document.getElementById('map').style.cursor = 'help';
                map.on('click', handleStreetViewClick);
            } else {
                btn.classList.remove('bg-blue-50', 'border-blue-500', 'text-blue-600');
                document.getElementById('map').style.cursor = '';
                map.off('click', handleStreetViewClick);
            }
        }

        function handleStreetViewClick(e) {
            openStreetViewModal(e.latlng.lat, e.latlng.lng);
            toggleStreetViewMode();
        }

        function openStreetViewModal(lat, lng) {
            const iframe = document.getElementById('streetview-iframe');
            iframe.src = `https://maps.google.com/maps?q=&layer=c&cbll=${lat},${lng}&cbp=11,0,0,0,0&output=svembed`;
            document.getElementById('streetview-modal').classList.remove('hidden');
        }

        function closeStreetView() {
            const iframe = document.getElementById('streetview-iframe');
            iframe.src = '';
            document.getElementById('streetview-modal').classList.add('hidden');
        }

        function processCoords() {
            const text = document.getElementById('coord-input').value.trim();
            const srcSys = document.getElementById('source-system').value;
            const tgtSys = document.getElementById('target-system').value;

            if (!text) {
                showToast('請輸入來源坐標！');
                return;
            }

            markersLayer.clearLayers();
            points = [];
            markersMap = {};

            const tgtSelect = document.getElementById('target-system');
            activeTargetLabel = tgtSelect.options[tgtSelect.selectedIndex].text;

            const listContainer = document.getElementById('list-container');
            const pointList = document.getElementById('point-list');
            pointList.innerHTML = '';

            const lines = text.split(/\n/);
            let outputLines = [];
            let bounds = [];

            lines.forEach((line, index) => {
                const cleanLine = line.trim();
                if (!cleanLine) return;

                const parts = cleanLine.split(/[\s,;\t]+/).filter(p => p !== "");
                if (parts.length >= 2) {
                    const val1 = parseFloat(parts[0]);
                    const val2 = parseFloat(parts[1]);

                    if (isNaN(val1) || isNaN(val2)) return;

                    let lng = 0, lat = 0;

                    if (srcSys === 'WGS84_LNG_LAT') {
                        lng = val1;
                        lat = val2;
                    } else if (srcSys === 'WGS84_LAT_LNG') {
                        lng = val2;
                        lat = val1;
                    } else if (srcSys === 'TWD97_EN') {
                        const conv = proj4("TWD97", "EPSG:4326", [val1, val2]);
                        lng = conv[0];
                        lat = conv[1];
                    } else if (srcSys === 'TWD97_NE') {
                        const conv = proj4("TWD97", "EPSG:4326", [val2, val1]);
                        lng = conv[0];
                        lat = conv[1];
                    }

                    if (lat < -90 || lat > 90 || lng < -180 || lng > 180) return;

                    let tgtX = 0, tgtY = 0;
                    if (tgtSys === 'WGS84_LNG_LAT') {
                        tgtX = lng;
                        tgtY = lat;
                    } else if (tgtSys === 'WGS84_LAT_LNG') {
                        tgtX = lat;
                        tgtY = lng;
                    } else if (tgtSys === 'TWD97_EN') {
                        const conv = proj4("EPSG:4326", "TWD97", [lng, lat]);
                        tgtX = conv[0];
                        tgtY = conv[1];
                    } else if (tgtSys === 'TWD97_NE') {
                        const conv = proj4("EPSG:4326", "TWD97", [lng, lat]);
                        tgtX = conv[1];
                        tgtY = conv[0];
                    }

                    const isLatLng = tgtSys.startsWith('WGS84');
                    const precision = isLatLng ? 8 : 3;
                    const outStr = `${tgtX.toFixed(precision)},${tgtY.toFixed(precision)}`;
                    outputLines.push(outStr);

                    const id = points.length + 1;
                    points.push({ 
                        id, 
                        srcX: val1, 
                        srcY: val2, 
                        lng, 
                        lat, 
                        tgtX, 
                        tgtY, 
                        outStr 
                    });
                    bounds.push([lat, lng]);

                    const icon = L.divIcon({
                        className: 'custom-marker-wrapper',
                        html: `<div class="custom-marker-node" id="node-${id}" style="width:24px; height:24px;">${id}</div>`,
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });

                    const popupHtml = `
                        <div class="text-xs p-1 leading-relaxed">
                            <div class="font-bold border-b pb-1 mb-1 text-slate-800">點位編號: ${id}</div>
                            <div><b>經度 (Lng):</b> ${lng.toFixed(7)}</div>
                            <div><b>緯度 (Lat):</b> ${lat.toFixed(7)}</div>
                            <div class="mt-1 text-red-600 font-mono text-[14px]">轉換值: ${outStr}</div>
                            <div class="mt-2 text-right">
                                <button onclick="openStreetViewModal(${lat}, ${lng})" class="bg-slate-850 hover:bg-slate-900 text-slate-800 hover:text-blue-600 font-bold py-1 px-2 rounded text-[10px] border border-slate-200 transition-colors">
                                    查看街景 ➔
                                </button>
                            </div>
                        </div>
                    `;

                    const marker = L.marker([lat, lng], { icon })
                        .bindPopup(popupHtml)
                        .addTo(markersLayer);

                    markersMap[id] = marker;

                    const row = document.createElement('div');
                    row.className = "flex items-center justify-between p-2.5 hover:bg-slate-50 cursor-pointer transition-colors";
                    row.onclick = () => focusPoint(id, lng, lat);
                    row.innerHTML = `
                        <div class="flex items-center space-x-2 overflow-hidden">
                            <span class="bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center shrink-0">${id}</span>
                            <span class="text-xs font-mono text-slate-600 truncate">${outStr}</span>
                        </div>
                        <span class="text-[10px] text-blue-500 font-medium shrink-0">定位 ➔</span>
                    `;
                    pointList.appendChild(row);
                }
            });

            const finalOutput = outputLines.join('\n');
            document.getElementById('coord-output').value = finalOutput;

            if (bounds.length > 0) {
                listContainer.classList.remove('hidden');
                map.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });
            } else {
                listContainer.classList.add('hidden');
            }

            if (finalOutput) {
                copyText(finalOutput);
                showToast('轉換完成，已自動複製至剪貼簿！');
            } else {
                showToast('無有效座標可轉換！');
            }
        }

        function copyText(val) {
            const el = document.createElement('textarea');
            el.value = val;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        }

        function exportCSV() {
            if (points.length === 0) return;
            const srcSys = document.getElementById('source-system').value;
            const tgtSys = document.getElementById('target-system').value;
            
            let srcCol1 = "來源座標_X", srcCol2 = "來源座標_Y";
            if (srcSys === 'WGS84_LNG_LAT') { srcCol1 = "來源座標_WGS84(Lng)"; srcCol2 = "來源座標_WGS84(Lat)"; }
            else if (srcSys === 'WGS84_LAT_LNG') { srcCol1 = "來源座標_WGS84(Lat)"; srcCol2 = "來源座標_WGS84(Lng)"; }
            else if (srcSys === 'TWD97_EN') { srcCol1 = "來源座標_TWD97(E)"; srcCol2 = "來源座標_TWD97(N)"; }
            else if (srcSys === 'TWD97_NE') { srcCol1 = "來源座標_TWD97(N)"; srcCol2 = "來源座標_TWD97(E)"; }

            let tgtCol1 = "目標座標_X", tgtCol2 = "目標座標_Y";
            if (tgtSys === 'WGS84_LNG_LAT') { tgtCol1 = "目標座標_WGS84(Lng)"; tgtCol2 = "目標座標_WGS84(Lat)"; }
            else if (tgtSys === 'WGS84_LAT_LNG') { tgtCol1 = "目標座標_WGS84(Lat)"; tgtCol2 = "目標座標_WGS84(Lng)"; }
            else if (tgtSys === 'TWD97_EN') { tgtCol1 = "目標座標_TWD97(E)"; tgtCol2 = "目標座標_TWD97(N)"; }
            else if (tgtSys === 'TWD97_NE') { tgtCol1 = "目標座標_TWD97(N)"; tgtCol2 = "目標座標_TWD97(E)"; }

            let csv = `\ufeff編號,${srcCol1},${srcCol2},${tgtCol1},${tgtCol2}\n`;

            points.forEach(p => {
                const isSrcLatLng = srcSys.startsWith('WGS84');
                const srcPrec = isSrcLatLng ? 8 : 3;
                const isTgtLatLng = tgtSys.startsWith('WGS84');
                const tgtPrec = isTgtLatLng ? 8 : 3;

                csv += `${p.id},${p.srcX.toFixed(srcPrec)},${p.srcY.toFixed(srcPrec)},${p.tgtX.toFixed(tgtPrec)},${p.tgtY.toFixed(tgtPrec)}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `coords_export.csv`;
            a.click();
        }

        function exportKML() {
            if (points.length === 0) return;
            let kml = `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n  <Document>\n`;
            points.forEach(p => {
                kml += `    <Placemark>\n      <name>點 ${p.id}</name>\n      <description>轉換值: ${p.outStr}</description>\n      <Point>\n        <coordinates>${p.lng.toFixed(7)},${p.lat.toFixed(7)},0</coordinates>\n      </Point>\n    </Placemark>\n`;
            });
            kml += `  </Document>\n</kml>`;
            const blob = new Blob([kml], { type: 'application/vnd.google-earth.kml+xml;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `coords_export.kml`;
            a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
