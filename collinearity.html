<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAV相片檢核點反投影</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            color: #0f172a; 
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 2K 螢幕優化：移除數字微調箭頭 */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* 面板與輸入框樣式 */
        .control-panel { background: #ffffff; border-radius: 14px; border: 1px solid #e2e8f0; padding: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .input-label { font-size: 13px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }
        .custom-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 14px; font-family: 'Fira Code', monospace; font-size: 15px; transition: all 0.2s; }
        .custom-input:focus { outline: none; border-color: #2563eb; background: white; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        /* 矩陣佈局 */
        .matrix-container { display: inline-grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px; position: relative; font-family: 'Fira Code', monospace; background: #fdfdfd; border-radius: 8px; border-left: 3px solid #cbd5e1; border-right: 3px solid #cbd5e1; font-size: 14px; margin: 15px 0; }

        /* 上下比例 2:1 控制 */
        #top-section { flex: 2; min-height: 0; display: flex; padding: 24px; gap: 24px; }
        #bottom-section { flex: 1; min-height: 0; background: #ffffff; border-top: 2px solid #e2e8f0; padding: 24px; overflow-y: auto; }

        #canvas-container { background: #0f172a; border-radius: 16px; position: relative; overflow: hidden; height: 100%; flex: 1; box-shadow: inset 0 0 40px rgba(0,0,0,0.5); }
        
        .phase-card { border-left: 4px solid #2563eb; padding-left: 1.5rem; margin-bottom: 2rem; }
        .phase-title { font-size: 13px; font-weight: 900; color: #2563eb; margin-bottom: 8px; letter-spacing: 1px; }
        .math-expr { background: #f8fafc; padding: 16px; border-radius: 10px; font-family: 'Fira Code', monospace; font-size: 15px; line-height: 1.8; color: #334155; border: 1px solid #e2e8f0; }
        
        .result-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 12px; }
        .result-val { font-size: 20px; font-weight: 900; color: #1e40af; font-family: 'Fira Code'; }
    </style>
</head>
<body>

    <!-- 上方區域 (2/3 高度) -->
    <div id="top-section">
        <!-- 左：影像畫布 -->
        <div id="canvas-container" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
            <canvas id="mainCanvas"></canvas>
            <!-- 狀態提示 -->
            <div class="absolute bottom-6 left-6 bg-black/50 backdrop-blur text-white px-4 py-2 rounded-lg text-xs font-bold pointer-events-none border border-white/10">
                操作：滾輪縮放 / 滑鼠拖拽影像
            </div>
        </div>

        <!-- 右：參數面板 -->
        <aside class="w-[480px] flex flex-col gap-4 overflow-y-auto pr-2">
            
            <!-- 面板 01：鏡頭資訊 -->
            <section class="control-panel border-l-4 border-l-blue-500">
                <div class="flex items-center gap-2 mb-4 border-b pb-2">
                    <span class="w-6 h-6 bg-blue-600 text-white rounded text-[12px] flex items-center justify-center font-bold">01</span>
                    <h2 class="text-sm font-black text-slate-700 uppercase">鏡頭資訊 (內方位)</h2>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><div class="input-label">焦距 f (mm)</div><input type="number" id="focal" value="12.300" step="0.001" class="custom-input auto-calc"></div>
                    <div><div class="input-label">像元大小 (公尺 m)</div><input type="number" id="pxSize" value="0.0000033" step="0.0000001" class="custom-input auto-calc"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><div class="input-label">影像寬 (像素)</div><input type="number" id="imgW" value="5280" class="custom-input auto-calc"></div>
                    <div><div class="input-label">影像高 (像素)</div><input type="number" id="imgH" value="3956" class="custom-input auto-calc"></div>
                </div>
            </section>

            <!-- 面板 02：相機外方位 -->
            <section class="control-panel border-l-4 border-l-emerald-500">
                <div class="flex items-center gap-2 mb-4 border-b pb-2">
                    <span class="w-6 h-6 bg-emerald-600 text-white rounded text-[12px] flex items-center justify-center font-bold">02</span>
                    <h2 class="text-sm font-black text-slate-700 uppercase">相機外方位 (TWD97)</h2>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <div><div class="input-label">東向 (X)</div><input type="number" id="eoX" value="250000.000" step="0.001" class="custom-input auto-calc"></div>
                    <div><div class="input-label">北向 (Y)</div><input type="number" id="eoY" value="2765000.000" step="0.001" class="custom-input auto-calc"></div>
                    <div><div class="input-label">高度 (Z)</div><input type="number" id="eoZ" value="150.000" step="0.001" class="custom-input auto-calc"></div>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div><div class="input-label">Ω (Omega°)</div><input type="number" id="eoOmega" value="0.000" step="0.001" class="custom-input auto-calc"></div>
                    <div><div class="input-label">Φ (Phi°)</div><input type="number" id="eoPhi" value="0.000" step="0.001" class="custom-input auto-calc"></div>
                    <div><div class="input-label">Κ (Kappa°)</div><input type="number" id="eoKappa" value="0.000" step="0.001" class="custom-input auto-calc"></div>
                </div>
            </section>

            <!-- 面板 03：地物目標 -->
            <section class="control-panel border-l-4 border-l-amber-500">
                <div class="flex items-center gap-2 mb-4 border-b pb-2">
                    <span class="w-6 h-6 bg-amber-500 text-white rounded text-[12px] flex items-center justify-center font-bold">03</span>
                    <h2 class="text-sm font-black text-slate-700 uppercase">目標地物點座標</h2>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div><div class="input-label">東向 (XP)</div><input type="number" id="gpX" value="250000.000" step="0.001" class="custom-input auto-calc"></div>
                    <div><div class="input-label">北向 (YP)</div><input type="number" id="gpY" value="2765000.000" step="0.001" class="custom-input auto-calc"></div>
                    <div><div class="input-label">海拔 (ZP)</div><input type="number" id="gpZ" value="0.000" step="0.001" class="custom-input auto-calc"></div>
                </div>
            </section>

            <!-- 面板 04：計算成果 -->
            <section class="control-panel border-l-4 border-l-slate-500">
                <div class="flex items-center gap-2 mb-4">
                    <span class="w-6 h-6 bg-slate-700 text-white rounded text-[12px] flex items-center justify-center font-bold">04</span>
                    <h2 class="text-sm font-black text-slate-700 uppercase">最終計算成果</h2>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="result-box">
                        <div class="input-label text-blue-600">像素 U (橫向)</div>
                        <div id="resU" class="result-val">0.000</div>
                    </div>
                    <div class="result-box">
                        <div class="input-label text-blue-600">像素 V (縱向)</div>
                        <div id="resV" class="result-val">0.000</div>
                    </div>
                </div>
            </section>
        </aside>
    </div>

    <div id="bottom-section">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-3 h-3 bg-blue-600 rounded-full animate-pulse"></div>
                <h3 class="text-[12px] font-black text-slate-400 uppercase tracking-[0.2em]">嚴謹推導日誌 (實際數值連動運算)</h3>
            </div>
            <div id="logBody" class="space-y-8 text-slate-600">
                <div class="text-center py-20 italic text-slate-300 text-lg">請於右側修改參數或拖入影像...</div>
            </div>
        </div>
    </div>

    <script>
        const WGS84 = "EPSG:4326";
        const TWD97_DEF = "+proj=tmerc +lat_0=0 +lon_0=121 +k=0.9999 +x_0=250000 +y_0=0 +ellps=GRS80 +units=m +no_defs";

        let state = {
            canvas: null, ctx: null, img: new Image(),
            view: { x: 0, y: 0, scale: 1 },
            isDragging: false, lastMouse: { x: 0, y: 0 },
            projectedPoint: null
        };

        const fmt = (n) => (typeof n === 'number' ? n.toFixed(3) : n);
        const toRad = (d) => d * Math.PI / 180;

        function addLogPhase(title, html) {
            const lb = document.getElementById('logBody');
            if (lb.querySelector('.italic')) lb.innerHTML = '';
            const div = document.createElement('div');
            div.className = "phase-card";
            div.innerHTML = `<div class="phase-title">${title}</div><div class="content">${html}</div>`;
            lb.appendChild(div);
        }

        function calculate() {
            document.getElementById('logBody').innerHTML = '';

            const f = parseFloat(document.getElementById('focal').value);
            const ps_m = parseFloat(document.getElementById('pxSize').value);
            const ps_mm = ps_m * 1000; 

            const XL = parseFloat(document.getElementById('eoX').value);
            const YL = parseFloat(document.getElementById('eoY').value);
            const ZL = parseFloat(document.getElementById('eoZ').value);
            
            const omega = toRad(parseFloat(document.getElementById('eoOmega').value));
            const phi = toRad(parseFloat(document.getElementById('eoPhi').value));
            const kappa = toRad(parseFloat(document.getElementById('eoKappa').value));
            
            const XP = parseFloat(document.getElementById('gpX').value);
            const YP = parseFloat(document.getElementById('gpY').value);
            const ZP = parseFloat(document.getElementById('gpZ').value);
            
            const W = parseInt(document.getElementById('imgW').value);
            const H = parseInt(document.getElementById('imgH').value);

            // Phase 1: 向量平移
            const dX = XP - XL, dY = YP - YL, dZ = ZP - ZL;
            addLogPhase("第一階段：空間平移向量 (地面座標系差值)", `
                <div class="math-expr">
                    ΔX = ${fmt(XP)} (XP) - ${fmt(XL)} (XL) = <span class="text-blue-600 font-bold">${fmt(dX)} m</span><br>
                    ΔY = ${fmt(YP)} (YP) - ${fmt(YL)} (YL) = <span class="text-blue-600 font-bold">${fmt(dY)} m</span><br>
                    ΔZ = ${fmt(ZP)} (ZP) - ${fmt(ZL)} (ZL) = <span class="text-blue-600 font-bold">${fmt(dZ)} m</span>
                </div>
            `);

            // Phase 2: 旋轉矩陣 (標準順序：Kappa -> Phi -> Omega)
            const co = Math.cos(omega), so = Math.sin(omega);
            const cp = Math.cos(phi), sp = Math.sin(phi);
            const ck = Math.cos(kappa), sk = Math.sin(kappa);

            const m11 = cp * ck;
            const m12 = co * sk + so * sp * ck;
            const m13 = so * sk - co * sp * ck;
            const m21 = -cp * sk;
            const m22 = co * ck - so * sp * sk;
            const m23 = so * ck + co * sp * sk;
            const m31 = sp;
            const m32 = -so * cp;
            const m33 = co * cp;

            addLogPhase("第二階段：旋轉矩陣 M (由 Ω, Φ, Κ 生成之姿態分量)", `
                <div class="matrix-container">
                    <div>${m11.toFixed(5)}</div><div>${m12.toFixed(5)}</div><div>${m13.toFixed(5)}</div>
                    <div>${m21.toFixed(5)}</div><div>${m22.toFixed(5)}</div><div>${m23.toFixed(5)}</div>
                    <div>${m31.toFixed(5)}</div><div>${m32.toFixed(5)}</div><div>${m33.toFixed(5)}</div>
                </div>
            `);

            // Phase 3: 共線方程式主體
            const q = m31 * dX + m32 * dY + m33 * dZ;
            const numX = m11 * dX + m12 * dY + m13 * dZ;
            const numY = m21 * dX + m22 * dY + m23 * dZ;

            const x_mm = -f * (numX / q);
            const y_mm = -f * (numY / q);

            addLogPhase("第三階段：共線方程式求解 (像平面物理座標 mm)", `
                <div class="math-expr">
                    共線分母 q = (${m31.toFixed(5)} × ${fmt(dX)}) + (${m32.toFixed(5)} × ${fmt(dY)}) + (${m33.toFixed(5)} × ${fmt(dZ)}) = <b>${fmt(q)}</b><br>
                    像點 x = -${fmt(f)} × (${fmt(numX)} / ${fmt(q)}) = <span class="text-blue-700 font-bold">${fmt(x_mm)} mm</span><br>
                    像點 y = -${fmt(f)} × (${fmt(numY)} / ${fmt(q)}) = <span class="text-blue-700 font-bold">${fmt(y_mm)} mm</span>
                </div>
            `);

            // Phase 4: 像素轉換
            const u = x_mm / ps_mm + (W / 2);
            const v = (H / 2) - (y_mm / ps_mm);

            addLogPhase("第四階段：物理空間轉像素空間 (數位影像對映)", `
                <div class="math-expr">
                    像元轉換：像素 U = ${fmt(x_mm)} / ${ps_mm.toFixed(7)} + (${W}/2) = <span class="text-emerald-700 font-black">${fmt(u)} px</span><br>
                    像元轉換：像素 V = (${H}/2) - ${fmt(y_mm)} / ${ps_mm.toFixed(7)} = <span class="text-emerald-700 font-black">${fmt(v)} px</span>
                </div>
            `);

            document.getElementById('resU').innerText = fmt(u);
            document.getElementById('resV').innerText = fmt(v);

            state.projectedPoint = { x: u, y: v };
            render();
        }

        function handleDrop(e) {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (!file) return;

            // 解析 DJI 姿態角 (XMP)
            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                const pMatch = text.match(/GimbalPitchDegree="([^"]+)"/);
                const yMatch = text.match(/GimbalYawDegree="([^"]+)"/);
                const rMatch = text.match(/GimbalRollDegree="([^"]+)"/);
                
                if (pMatch) document.getElementById('eoPhi').value = (parseFloat(pMatch[1]) + 90).toFixed(3);
                if (rMatch) document.getElementById('eoOmega').value = parseFloat(rMatch[1]).toFixed(3);
                if (yMatch) document.getElementById('eoKappa').value = (-parseFloat(yMatch[1])).toFixed(3);
            };
            reader.readAsText(file.slice(0, 150000));

            // 解析 GPS (EXIF)
            EXIF.getData(file, function() {
                const tags = EXIF.getAllTags(this);
                const lat = decodeGPS(tags.GPSLatitude, tags.GPSLatitudeRef);
                const lon = decodeGPS(tags.GPSLongitude, tags.GPSLongitudeRef);
                const alt = tags.GPSAltitude ? tags.GPSAltitude.numerator/tags.GPSAltitude.denominator : 150;

                if (lat && lon) {
                    const [tx, ty] = proj4(WGS84, TWD97_DEF, [lon, lat]);
                    document.getElementById('eoX').value = tx.toFixed(3);
                    document.getElementById('eoY').value = ty.toFixed(3);
                    document.getElementById('eoZ').value = alt.toFixed(3);
                    document.getElementById('gpX').value = tx.toFixed(3);
                    document.getElementById('gpY').value = ty.toFixed(3);
                }

                const imgReader = new FileReader();
                imgReader.onload = (ie) => {
                    state.img.onload = () => {
                        document.getElementById('imgW').value = state.img.width;
                        document.getElementById('imgH').value = state.img.height;
                        resetView();
                        calculate();
                    };
                    state.img.src = ie.target.result;
                };
                imgReader.readAsDataURL(file);
            });
        }

        function decodeGPS(data, ref) {
            if (!data) return null;
            let d = data[0].numerator/data[0].denominator;
            let m = data[1].numerator/data[1].denominator;
            let s = data[2].numerator/data[2].denominator;
            let res = d + m/60 + s/3600;
            return (ref === 'S' || ref === 'W') ? -res : res;
        }

        function initCanvas() {
            state.canvas = document.getElementById('mainCanvas');
            state.ctx = state.canvas.getContext('2d');
            const container = document.getElementById('canvas-container');

            const resize = () => {
                state.canvas.width = container.clientWidth;
                state.canvas.height = container.clientHeight;
                render();
            };
            window.addEventListener('resize', resize);
            resize();

            state.canvas.onmousedown = e => { state.isDragging = true; state.lastMouse = { x: e.clientX, y: e.clientY }; };
            window.onmousemove = e => {
                if (!state.isDragging) return;
                state.view.x += e.clientX - state.lastMouse.x;
                state.view.y += e.clientY - state.lastMouse.y;
                state.lastMouse = { x: e.clientX, y: e.clientY };
                render();
            };
            window.onmouseup = () => state.isDragging = false;
            state.canvas.onwheel = e => {
                e.preventDefault();
                const factor = e.deltaY > 0 ? 0.9 : 1.1;
                state.view.x = e.offsetX - (e.offsetX - state.view.x) * factor;
                state.view.y = e.offsetY - (e.offsetY - state.view.y) * factor;
                state.view.scale *= factor;
                render();
            };
        }

        function render() {
            const { ctx, canvas, img, view, projectedPoint } = state;
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(view.x, view.y);
            ctx.scale(view.scale, view.scale);

            if (img.src) {
                ctx.drawImage(img, -img.width/2, -img.height/2);
                
                // 十字分割線 (雙層效果以確保可視性)
                const drawGuideLine = (x1, y1, x2, y2) => {
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                    ctx.lineWidth = 4 / view.scale;
                    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                    ctx.lineWidth = 1.5 / view.scale;
                    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
                    ctx.stroke();
                };

                // 水平與垂直貫穿全圖
                drawGuideLine(-img.width/2, 0, img.width/2, 0);
                drawGuideLine(0, -img.height/2, 0, img.height/2);

                // 投影紅點
                if (projectedPoint) {
                    const dx = projectedPoint.x - img.width/2;
                    const dy = projectedPoint.y - img.height/2;
                    
                    ctx.beginPath();
                    ctx.arc(dx, dy, 18/view.scale, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.4)';
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(dx, dy, 6/view.scale, 0, Math.PI*2);
                    ctx.fillStyle = '#ef4444';
                    ctx.fill();

                    const s = 25 / view.scale;
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 1.5/view.scale;
                    ctx.beginPath();
                    ctx.moveTo(dx - s, dy); ctx.lineTo(dx + s, dy);
                    ctx.moveTo(dx, dy - s); ctx.lineTo(dx, dy + s);
                    ctx.stroke();
                }
            } else {
                ctx.fillStyle = '#475569';
                ctx.font = 'bold 24px Inter';
                ctx.textAlign = 'center';
                ctx.fillText("請將 DJI 影像檔案拖入此區域", 0, 0);
            }
            ctx.restore();
        }

        function resetView() {
            if (!state.img.width) {
                state.view = { x: state.canvas.width/2, y: state.canvas.height/2, scale: 1 };
                return;
            }
            const scale = Math.min(state.canvas.width/state.img.width, state.canvas.height/state.img.height) * 0.9;
            state.view = { x: state.canvas.width/2, y: state.canvas.height/2, scale: scale };
            render();
        }

        window.onload = () => {
            initCanvas();
            resetView();
            document.querySelectorAll('.auto-calc').forEach(el => el.oninput = calculate);
        };
    </script>
</body>
</html>
