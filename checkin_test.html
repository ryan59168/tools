<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行動打卡系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800 antialiased">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold tracking-wide">行動打卡系統</h1>
            <p class="text-blue-100 text-sm mt-1">請填妥資料並拍照完成每日打卡</p>
            <div id="live-clock" class="mt-3 text-lg font-mono font-semibold bg-white/20 inline-block px-4 py-1 rounded-full backdrop-blur-sm">
                載入時間中...
            </div>
        </div>

        <div class="p-6 space-y-6">
            
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1.5">員工姓名 <span class="text-rose-500">*</span></label>
                <input type="text" id="name" placeholder="請輸入您的真實姓名" 
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-base">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1.5">備註 <span class="text-slate-400 text-xs">(選填)</span></label>
                <textarea id="notes" placeholder="若有特殊狀況請在此輸入備註說明..." rows="2"
         	     class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-base resize-none"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">現場拍照 / 選擇照片 <span class="text-rose-500">*</span></label>
                
                <input type="file" id="photo-input" accept="image/*" capture="user" class="hidden" onchange="previewImage(event)">
                
                <div onclick="triggerPhotoInput()" 
                     class="group cursor-pointer border-2 border-dashed border-slate-300 hover:border-blue-500 rounded-2xl p-6 transition-all flex flex-col items-center justify-center bg-slate-50/50 hover:bg-blue-50/30 min-h-[180px] relative overflow-hidden">
                    
                    <img id="image-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                    
                    <div id="preview-overlay" class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity hidden">
                        <span class="text-white font-medium bg-black/60 px-4 py-2 rounded-lg text-sm">重新拍照</span>
                    </div>

                    <div id="upload-prompt" class="text-center space-y-2">
                        <svg class="mx-auto h-12 w-12 text-slate-400 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <div class="text-slate-600 font-medium">點擊啟動相機拍照</div>
                        <p class="text-xs text-slate-400">拍攝上傳照片</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-2">
                <button onclick="handleCheckIn('上班')" id="btn-checkin"
                        class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white font-bold rounded-2xl shadow-lg shadow-emerald-500/20 transition-all flex flex-col items-center justify-center">
                    <span class="text-lg">☀️ 上班打卡</span>
                    <span class="text-xs text-emerald-100 mt-0.5 font-normal tracking-wider">Check In</span>
                </button>
                
                <button onclick="handleCheckIn('下班')" id="btn-checkout"
                        class="w-full py-4 bg-rose-500 hover:bg-rose-600 active:scale-95 text-white font-bold rounded-2xl shadow-lg shadow-rose-500/20 transition-all flex flex-col items-center justify-center">
                    <span class="text-lg">🌙 下班打卡</span>
                    <span class="text-xs text-rose-100 mt-0.5 font-normal tracking-wider">Check Out</span>
                </button>
            </div>

        </div>

        <div class="bg-slate-50 px-6 py-4 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-400">本系統會自動記錄打卡當下的定位與時間</p>
        </div>
    </div>

    <div id="status-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform transition-all scale-95 opacity-0 duration-300" id="modal-content">
            <div id="modal-loading-icon" class="hidden">
                <div class="w-16 h-16 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin-custom mx-auto mb-4"></div>
                <h3 class="text-lg font-bold text-slate-800">打卡資料傳輸中</h3>
                <p class="text-slate-500 text-sm mt-2">正在獲取定位、上傳照片...</p>
            </div>
            
            <div id="modal-success-icon" class="hidden">
                <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">✓</div>
                <h3 class="text-xl font-bold text-slate-800" id="success-title">打卡成功！</h3>
                <p class="text-slate-500 text-sm mt-2" id="success-desc">祝您今天工作愉快！</p>
                <button onclick="closeModal()" class="mt-6 w-full py-3 bg-slate-800 hover:bg-slate-700 text-white font-medium rounded-xl transition-colors">確認</button>
            </div>

            <div id="modal-error-icon" class="hidden">
                <div class="w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">✕</div>
                <h3 class="text-xl font-bold text-slate-800">提示</h3>
                <p class="text-slate-500 text-sm mt-2" id="error-desc">請檢查欄位資訊或定位權限。</p>
                <button onclick="closeModal()" class="mt-6 w-full py-3 bg-rose-600 hover:bg-rose-500 text-white font-medium rounded-xl transition-colors">確認</button>
            </div>
        </div>
    </div>

    <script>
        // ⚠️【請注意】填入上一步重新部署後取得的 EXEC 網址 ⚠️
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx46041sRuEBeLrSJn2DdL3V8dTNY3PtN6vzyyP3XUltdm6m0aqHayuavAg7nwNUoITYQ/exec"; 
        
        let base64PhotoData = ""; 
        let rawFileName = "";

        // 即時時鐘更新
        function updateClock() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('live-clock').innerText = `${year}/${month}/${date} ${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function triggerPhotoInput() {
            document.getElementById('photo-input').click();
        }

        // ⭐ 保留：壓縮照片並轉為 Base64 字串 ⭐
        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            rawFileName = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max_size = 800; // 前端壓縮最大邊長至 800px，縮小檔案體積
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > max_size) {
                            height *= max_size / width;
                            width = max_size;
                        }
                    } else {
                        if (height > max_size) {
                            width *= max_size / height;
                            height = max_size;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // 將照片轉成 Base64 格式的 Jpeg 字串 (此處 0.8 為 80% 品質JPEG)
                    base64PhotoData = canvas.toDataURL('image/jpeg', 0.8);

                    const previewImg = document.getElementById('image-preview');
                    const uploadPrompt = document.getElementById('upload-prompt');
                    const overlay = document.getElementById('preview-overlay');

                    previewImg.src = base64PhotoData;
                    previewImg.classList.remove('hidden');
                    overlay.classList.remove('hidden');
                    uploadPrompt.classList.add('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function showModal(type, titleText = "", descText = "") {
            const modal = document.getElementById('status-modal');
            const content = document.getElementById('modal-content');
            
            document.getElementById('modal-loading-icon').classList.add('hidden');
            document.getElementById('modal-success-icon').classList.add('hidden');
            document.getElementById('modal-error-icon').classList.add('hidden');

            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 50);

            if (type === 'loading') {
                document.getElementById('modal-loading-icon').classList.remove('hidden');
            } else if (type === 'success') {
                document.getElementById('modal-success-icon').classList.remove('hidden');
                document.getElementById('success-title').innerText = titleText;
                document.getElementById('success-desc').innerText = descText;
            } else if (type === 'error') {
                document.getElementById('modal-error-icon').classList.remove('hidden');
                document.getElementById('error-desc').innerText = descText;
            }
        }

        function closeModal() {
            const modal = document.getElementById('status-modal');
            const content = document.getElementById('modal-content');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // 統一送出打卡資料邏輯
        async function handleCheckIn(type) {
            const name = document.getElementById("name").value.trim();
            const notes = document.getElementById("notes").value.trim();

            if (!name) { showModal('error', '', '請填寫員工姓名！'); return; }
            if (!base64PhotoData) { showModal('error', '', '打卡必須拍攝現場照片！'); return; }

            // ⚠️ 先顯示 Loading，因為獲取座標可能需要幾秒鐘
            showModal('loading');

            const now = new Date();
            const dateStr = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;
            // 檔名優化：精細到秒，防呆同一分鐘檔案衝突
            const timeStrForFile = `${String(now.getHours()).padStart(2, '0')}-${String(now.getMinutes()).padStart(2, '0')}-${String(now.getSeconds()).padStart(2, '0')}`;
            const timeStrForSheet = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

            // --- ⭐ 保留：自動獲取當下座標功能 ⭐ ---
            let locationData = "未獲取定位"; // 預設值
            
            // 封裝 Geolocation API 為 Promise 以搭配 await
            const getLocation = () => {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) {
                        resolve("瀏覽器不支援定位");
                        return;
                    }

                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            // 成功：緯度, 經度
                            const lat = position.coords.latitude.toFixed(6);
                            const lng = position.coords.longitude.toFixed(6);
                            resolve(`${lat}, ${lng}`);
                        },
                        (error) => {
                            // 失敗：不阻礙打卡流程，記錄失敗原因
                            let errorMsg = "定位失敗:拒絕授權或位置不可用";
                            resolve(errorMsg);
                        },
                        // 定位參數設定：啟用高精度、設定 10 秒逾時
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                });
            };

            // 等待獲取座標結果
            locationData = await getLocation();
            // ----------------------------------------

            // 將 前端壓縮過的 Base64 前面的 "data:image/jpeg;base64," 移除，只留下純資料送給後端轉檔
            const cleanBase64 = base64PhotoData.replace(/^data:image\/(png|jpeg|jpg);base64,/, "");

            const payload = {
                type: type,
                name: name,
                phone: notes,
                date: dateStr,
                time: timeStrForSheet,
                location: locationData, // 座標資料
                photo: cleanBase64,     // ⭐ 前端壓縮過的純 Base64 相片⭐
                // 雲端資料夾檔名：格式 [打卡_張三_2026-06-19_10-51-00_上班.jpg]
                fileName: `${name}_${dateStr.replace(/\//g, '-')}_${timeStrForFile}_${type}.jpg`
            };

            try {
                // 使用 fetch POST 資料到 Google Apps Script
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === "success") {
                    showModal('success', `${type}打卡成功！`, `記錄時間為：${dateStr} ${timeStrForSheet}`);
                    resetPhoto();
                } else {
                    showModal('error', '', '伺服器寫入失敗：' + result.message);
                }
            } catch (error) {
                console.error("Error:", error);
                showModal('error', '', '連線失敗，請確認 Apps Script 已重新部署為新版本，且誰可以存取權限設為「任何人」。');
            }
        }

        function resetPhoto() {
            base64PhotoData = "";
            document.getElementById('photo-input').value = "";
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('image-preview').src = "";
            document.getElementById('preview-overlay').classList.add('hidden');
            document.getElementById('upload-prompt').classList.remove('hidden');
        }
    </script>
</body>
</html>
