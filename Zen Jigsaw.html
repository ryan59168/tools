<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Jigsaw - 禪風極簡拼圖</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        /* 拼圖塊拖曳時的陰影與縮放 */
        .puzzle-piece-active {
            transform: scale(1.05) !important;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.6), 0 8px 10px -6px rgb(0 0 0 / 0.6);
            cursor: grabbing !important;
            z-index: 50;
        }
        /* 滾動條樣式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col justify-between overflow-x-hidden selection:bg-teal-500 selection:text-white">

    <!-- 頂部導覽列 -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-40 px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-gradient-to-tr from-teal-500 to-emerald-500 rounded-xl shadow-lg shadow-teal-500/20">
                    <i data-lucide="puzzle" class="w-6 h-6 text-slate-900"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider bg-gradient-to-r from-teal-400 to-emerald-400 bg-clip-text text-transparent">Zen Jigsaw</h1>
                    <p class="text-xs text-slate-400">上傳相片，靜心拼湊美好時光</p>
                </div>
            </div>
            
            <!-- 遊戲計數與控制 -->
            <div class="flex flex-wrap items-center gap-4 sm:gap-6 text-sm">
                <div class="flex items-center gap-2 bg-slate-800/80 px-3.5 py-1.5 rounded-lg border border-slate-700/50">
                    <i data-lucide="timer" class="w-4 h-4 text-teal-400"></i>
                    <span class="text-slate-400">時間:</span>
                    <span id="timer-display" class="font-mono font-bold text-teal-300">00:00</span>
                </div>
                <div class="flex items-center gap-2 bg-slate-800/80 px-3.5 py-1.5 rounded-lg border border-slate-700/50">
                    <i data-lucide="footprints" class="w-4 h-4 text-emerald-400"></i>
                    <span class="text-slate-400">步數:</span>
                    <span id="moves-display" class="font-mono font-bold text-emerald-300">0</span>
                </div>
                <button id="sound-btn" class="p-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-300 transition" title="開關音效">
                    <i id="sound-icon" data-lucide="volume-2" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 主要遊戲區 -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 flex flex-col lg:flex-row gap-8 items-start justify-center">
        
        <!-- 左側：上傳、設定與預覽區 -->
        <section class="w-full lg:w-80 shrink-0 flex flex-col gap-6">
            <!-- 拖曳上傳區 -->
            <div id="drop-zone" class="border-2 border-dashed border-slate-700 hover:border-teal-500/80 bg-slate-900/40 hover:bg-slate-900/60 rounded-2xl p-6 text-center cursor-pointer transition-all duration-300 group">
                <input type="file" id="file-input" accept="image/*" class="hidden">
                <div class="flex flex-col items-center gap-3">
                    <div class="p-4 bg-slate-800/80 rounded-full text-slate-400 group-hover:text-teal-400 transition-colors duration-300">
                        <i data-lucide="upload-cloud" class="w-8 h-8"></i>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-slate-200">拖曳或點擊上傳相片</p>
                        <p class="text-xs text-slate-500 mt-1">支援 PNG, JPG, WEBP</p>
                    </div>
                </div>
            </div>

            <!-- 難度設定 -->
            <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-5">
                <h3 class="text-sm font-semibold text-slate-400 mb-3 flex items-center gap-2">
                    <i data-lucide="sliders" class="w-4 h-4"></i> 選擇難度
                </h3>
                <div class="grid grid-cols-3 gap-2 p-1 bg-slate-950 rounded-xl border border-slate-800">
                    <button class="difficulty-btn px-3 py-2 text-xs font-medium rounded-lg text-slate-400 hover:text-slate-200 transition" data-grid="3">
                        易 (3x3)
                    </button>
                    <button class="difficulty-btn px-3 py-2 text-xs font-medium rounded-lg text-slate-400 hover:text-slate-200 transition" data-grid="4">
                        中 (4x4)
                    </button>
                    <button class="difficulty-btn px-3 py-2 text-xs font-medium rounded-lg text-slate-400 hover:text-slate-200 transition" data-grid="6">
                        難 (6x6)
                    </button>
                </div>
            </div>

            <!-- 控制面板 -->
            <div class="bg-slate-900/40 border border-slate-800 rounded-2xl p-5 flex flex-col gap-3">
                <button id="restart-btn" class="w-full py-3 bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-slate-950 font-bold rounded-xl transition shadow-lg shadow-teal-500/10 flex items-center justify-center gap-2">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 重新洗牌
                </button>
                <div class="flex items-center justify-between px-1 mt-1">
                    <span class="text-xs text-slate-400 flex items-center gap-1.5">
                        <i data-lucide="eye" class="w-3.5 h-3.5"></i> 背景提示
                    </span>
                    <input type="range" id="hint-range" min="0" max="40" value="0" class="w-24 accent-teal-500 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                </div>
                <div class="flex items-center justify-between px-1 mt-1">
                    <span class="text-xs text-slate-400 flex items-center gap-1.5">
                        <i data-lucide="maximize-2" class="w-3.5 h-3.5"></i> 拼圖縮放
                    </span>
                    <input type="range" id="scale-range" min="50" max="150" value="100" class="w-24 accent-teal-500 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>
        </section>

        <!-- 右側：拼圖主戰場 -->
        <section class="flex-1 w-full flex flex-col items-center gap-8">
            <!-- 遊戲整合容器 -->
            <div id="game-workspace" class="w-full flex flex-col items-center gap-6">
                
                <!-- 拼圖外層卡片（防止超出螢幕的關鍵） -->
                <div class="relative bg-slate-950/80 rounded-2xl p-4 border border-slate-800 shadow-2xl w-full flex justify-center items-center overflow-hidden">
                    
                    <!-- 內嵌捲動包裝器：當拼圖放大到大於螢幕時，只有拼圖區可以滑動，網格與頁面依然不跑版 -->
                    <div class="w-full overflow-auto max-w-full flex justify-start sm:justify-center items-center py-2" id="board-scroll-wrapper">
                        
                        <!-- 真正的拼圖面板，初始預設尺寸防止 UI 坍塌擠壓 -->
                        <div id="puzzle-board" class="relative overflow-hidden rounded-xl border border-dashed border-slate-700/80 bg-slate-900/20 transition-all duration-300 flex items-center justify-center shrink-0 w-[480px] h-[320px]">
                            
                            <!-- 提示文字（大範圍、美觀且不被擠壓） -->
                            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 z-10 cursor-pointer group">
                                <div class="p-4 bg-slate-800/60 rounded-full text-teal-400 mb-3 group-hover:scale-110 transition duration-300">
                                    <i data-lucide="image-plus" class="w-8 h-8"></i>
                                </div>
                                <p class="text-slate-200 font-medium text-base">請先拖曳或點擊上傳相片</p>
                                <p class="text-slate-500 text-xs mt-1">支援各種解析度，將會智慧優化</p>
                            </div>

                            <!-- 半透明背景提示圖 (預設透明度為 0) -->
                            <div id="board-hint-bg" class="absolute inset-0 bg-cover bg-center pointer-events-none transition-opacity duration-300" style="opacity: 0;"></div>
                            <!-- 網格輔助線 -->
                            <div id="board-grid-helper" class="absolute inset-0 pointer-events-none grid"></div>
                            <!-- 放置拼圖的容器（不論對錯都放在這裡） -->
                            <div id="snapped-container" class="absolute inset-0"></div>
                        </div>
                        
                    </div>
                </div>

                <!-- 拼圖備選池 (散落區) -->
                <div class="w-full bg-slate-900/30 border border-slate-800/80 rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                            <i data-lucide="layout-grid" class="w-3.5 h-3.5 text-teal-400"></i> 拼圖碎片池
                        </h4>
                        <span class="text-[10px] text-slate-500 bg-slate-850 px-2 py-0.5 rounded border border-slate-800">
                            保持 100% 原始大小，好拿好對位
                        </span>
                    </div>
                    <!-- 碎片存放區 -->
                    <div id="pieces-pool" class="min-h-[140px] flex flex-wrap gap-4 items-center justify-center bg-slate-950/40 rounded-xl p-4 border border-slate-900/60 transition-colors duration-300">
                        <!-- 動態生成未完成的拼圖碎片 -->
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- 底部資訊 -->
    <footer class="border-t border-slate-900 py-6 text-center text-xs text-slate-500">
        <p>© 2026 Zen Jigsaw. 專注於指尖的平靜。支援離線遊玩與自訂圖片。</p>
    </footer>

    <!-- 勝利慶祝與統計彈窗 -->
    <div id="victory-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500">
        <div class="bg-gradient-to-b from-slate-900 to-slate-950 border border-slate-800 rounded-3xl p-8 max-w-sm w-full mx-4 text-center shadow-2xl transform scale-90 transition-transform duration-500">
            <div class="w-20 h-20 bg-gradient-to-tr from-yellow-400 to-amber-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-amber-500/20 animate-bounce">
                <i data-lucide="trophy" class="w-10 h-10 text-slate-950"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-100 mb-2">恭喜完成拼圖！</h2>
            <p class="text-sm text-teal-400 font-medium mb-6">身心舒暢，專注圓滿</p>
            
            <div class="grid grid-cols-2 gap-4 mb-8 bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                <div>
                    <p class="text-xs text-slate-500">總耗時</p>
                    <p id="modal-time" class="text-lg font-bold text-slate-200 font-mono mt-1">00:00</p>
                </div>
                <div>
                    <p class="text-xs text-slate-500">移動步數</p>
                    <p id="modal-moves" class="text-lg font-bold text-slate-200 font-mono mt-1">0</p>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button id="modal-replay-btn" class="w-full py-3 bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-slate-950 font-bold rounded-xl transition">
                    再玩一次
                </button>
                <button id="modal-close-btn" class="w-full py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm font-medium rounded-xl transition">
                    關閉
                </button>
            </div>
        </div>
    </div>

    <!-- 用於慶祝的 Canvas -->
    <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-40 hidden"></canvas>

    <!-- 核心遊戲邏輯 -->
    <script>
        // 初始化 Lucide 圖標
        lucide.createIcons();

        // 遊戲狀態變數
        let imageSrc = null; 
        let gridSize = 3; // 預設 3x3
        let pieces = [];
        let totalPieces = 9;
        let isPlaying = false;
        let timerInterval = null;
        let startTime = null;
        let elapsedSeconds = 0;
        let movesCount = 0;
        let soundEnabled = true;
        let boardSize = { width: 0, height: 0 };
        let boardScale = 1.0; // 預設 100% 縮放

        // DOM 元素
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const difficultyBtns = document.querySelectorAll('.difficulty-btn');
        const restartBtn = document.getElementById('restart-btn');
        const hintRange = document.getElementById('hint-range');
        const scaleRange = document.getElementById('scale-range');
        const timerDisplay = document.getElementById('timer-display');
        const movesDisplay = document.getElementById('moves-display');
        const soundBtn = document.getElementById('sound-btn');
        const soundIcon = document.getElementById('sound-icon');
        const emptyState = document.getElementById('empty-state');
        const puzzleBoard = document.getElementById('puzzle-board');
        const boardHintBg = document.getElementById('board-hint-bg');
        const boardGridHelper = document.getElementById('board-grid-helper');
        const snappedContainer = document.getElementById('snapped-container');
        const piecesPool = document.getElementById('pieces-pool');
        
        // 彈窗與慶祝
        const victoryModal = document.getElementById('victory-modal');
        const modalTime = document.getElementById('modal-time');
        const modalMoves = document.getElementById('modal-moves');
        const modalReplayBtn = document.getElementById('modal-replay-btn');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const confettiCanvas = document.getElementById('confetti-canvas');

        // 音訊合成器 (Web Audio API)
        function playTone(freq, type, duration, delay = 0) {
            if (!soundEnabled) return;
            setTimeout(() => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.start();
                    osc.stop(ctx.currentTime + duration);
                } catch (e) {
                    console.log('Audio Context Error', e);
                }
            }, delay * 1000);
        }

        function playSnapSound() {
            playTone(450, 'sine', 0.1);
            playTone(900, 'sine', 0.15, 0.03);
        }

        function playPlaceSound() {
            playTone(180, 'triangle', 0.08);
        }

        function playShuffleSound() {
            playTone(200, 'triangle', 0.1);
            playTone(300, 'triangle', 0.1, 0.05);
        }

        function playVictorySound() {
            const melody = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50]; 
            melody.forEach((note, index) => {
                playTone(note, 'sine', 0.4, index * 0.12);
            });
        }

        // 初始化與配置載入
        window.addEventListener('load', () => {
            selectDifficulty(3); // 預設易
            window.addEventListener('resize', handleResize);
        });

        // 點擊空狀態或上傳區觸發檔案選取
        emptyState.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFileSelect);
        
        // 拖曳上傳事件
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-teal-500', 'bg-slate-900/80');
        });

        document.addEventListener('dragover', (e) => {
            e.preventDefault(); 
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-teal-500', 'bg-slate-900/80');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-teal-500', 'bg-slate-900/80');
            if (e.dataTransfer.files.length > 0) {
                processFile(e.dataTransfer.files[0]);
            }
        });

        // 難度切換
        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const size = parseInt(btn.getAttribute('data-grid'));
                selectDifficulty(size);
                if (imageSrc) {
                    initPuzzle();
                }
            });
        });

        // 控制項
        restartBtn.addEventListener('click', () => {
            if (imageSrc) initPuzzle();
            else showToast("請先上傳相片！");
        });

        hintRange.addEventListener('input', (e) => {
            const val = e.target.value;
            boardHintBg.style.opacity = val / 100;
        });

        // 縮放功能重啟
        scaleRange.addEventListener('input', (e) => {
            boardScale = parseInt(e.target.value) / 100;
            if (imageSrc && isPlaying) {
                recalculateLayout();
            }
        });

        soundBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            if (soundEnabled) {
                soundIcon.setAttribute('data-lucide', 'volume-2');
                soundBtn.classList.remove('bg-red-950/40', 'text-red-400');
                soundBtn.classList.add('bg-slate-800', 'text-slate-300');
            } else {
                soundIcon.setAttribute('data-lucide', 'volume-x');
                soundBtn.classList.add('bg-red-950/40', 'text-red-400');
                soundBtn.classList.remove('bg-slate-800', 'text-slate-300');
            }
            lucide.createIcons();
        });

        // 彈窗按鈕
        modalReplayBtn.addEventListener('click', () => {
            hideVictory();
            initPuzzle();
        });
        modalCloseBtn.addEventListener('click', hideVictory);

        // 檔案處理
        function handleFileSelect(e) {
            if (e.target.files.length > 0) {
                processFile(e.target.files[0]);
            }
        }

        // 智慧壓縮處理 (保持 100% 原始解析度)
        function processFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast("請上傳有效的相片檔案！");
                return;
            }
            
            showToast("正在智慧優化相片，保持無損解析度中...");
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.naturalWidth; 
                    canvas.height = img.naturalHeight; 
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    
                    loadGameImage(compressedDataUrl);
                    showToast("相片最佳化成功！準備靜心拼圖。");
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 載入遊戲主圖
        function loadGameImage(src) {
            imageSrc = src;
            emptyState.classList.add('hidden');
            puzzleBoard.classList.remove('border-dashed', 'border-slate-700/80');
            puzzleBoard.classList.add('border-slate-800');
            
            const img = new Image();
            img.onload = function() {
                initPuzzle();
            };
            img.onerror = function() {
                showToast("載入圖片失敗，請嘗試其他相片。");
            };
            img.src = src;
        }

        // 設定難度高亮
        function selectDifficulty(size) {
            gridSize = size;
            totalPieces = size * size;
            difficultyBtns.forEach(btn => {
                const btnSize = parseInt(btn.getAttribute('data-grid'));
                if (btnSize === size) {
                    btn.classList.remove('text-slate-400');
                    btn.classList.add('bg-teal-500', 'text-slate-950', 'font-bold', 'shadow-lg', 'shadow-teal-500/20');
                } else {
                    btn.classList.add('text-slate-400');
                    btn.classList.remove('bg-teal-500', 'text-slate-950', 'font-bold', 'shadow-lg', 'shadow-teal-500/20');
                }
            });
        }

        // 自適應調整大小
        function handleResize() {
            if (!isPlaying || !imageSrc) return;
            
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(() => {
                recalculateLayout();
            }, 150);
        }

        // 核心：重新計算拼圖盤面與碎片比例
        function recalculateLayout() {
            if (!imageSrc) return;
            const workspace = document.getElementById('game-workspace');
            
            // 基礎自適應可用寬度 (依照捲動包裝器調整)
            const baseW = Math.min(workspace.clientWidth - 32, 520);
            
            // 套用縮放比只到「目標主底板」上
            const maxW = baseW * boardScale;
            
            const img = new Image();
            img.src = imageSrc;
            img.onload = function() {
                const ratio = img.naturalHeight / img.naturalWidth;
                let w = maxW;
                let h = maxW * ratio;
                
                const maxH = window.innerHeight * 0.45 * boardScale;
                if (h > maxH) {
                    h = maxH;
                    w = maxH / ratio;
                }

                boardSize = { width: Math.floor(w), height: Math.floor(h) };
                
                // 套用新的拼圖底板尺寸
                puzzleBoard.style.width = boardSize.width + 'px';
                puzzleBoard.style.height = boardSize.height + 'px';
                boardHintBg.style.backgroundImage = `url("${imageSrc}")`;
                
                updateGridHelper();
                updatePiecesDimensions();
            };
        }

        // 更新輔助網格
        function updateGridHelper() {
            boardGridHelper.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            boardGridHelper.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;
            
            boardGridHelper.innerHTML = '';
            for (let i = 0; i < totalPieces; i++) {
                const cell = document.createElement('div');
                cell.className = 'border border-slate-800/40 pointer-events-none';
                boardGridHelper.appendChild(cell);
            }
        }

        // 關鍵核心：更新拼圖尺寸 (碎片池恆保 100% 原始尺寸，底板上跟隨縮放)
        function updatePiecesDimensions() {
            const baseBoardWidth = boardSize.width / boardScale;
            const baseBoardHeight = boardSize.height / boardScale;
            
            // 100% 原始大小
            const pieceW_base = baseBoardWidth / gridSize;
            const pieceH_base = baseBoardHeight / gridSize;

            // 縮放後的單片大小
            const pieceW_scaled = boardSize.width / gridSize;
            const pieceH_scaled = boardSize.height / gridSize;

            pieces.forEach(p => {
                const el = p.element;
                if (!el) return;

                const isOnBoard = p.isSnapped || (p.currentBoardRow !== null && p.currentBoardCol !== null);

                if (isOnBoard) {
                    // 1. 在底板上：使用縮放後的尺寸
                    p.width = pieceW_scaled;
                    p.height = pieceH_scaled;
                    el.style.width = pieceW_scaled + 'px';
                    el.style.height = pieceH_scaled + 'px';
                    el.style.backgroundImage = `url("${imageSrc}")`;
                    el.style.backgroundSize = `${boardSize.width}px ${boardSize.height}px`;
                    el.style.backgroundPosition = `-${p.correctCol * pieceW_scaled}px -${p.correctRow * pieceH_scaled}px`;
                    
                    if (p.isSnapped) {
                        el.style.left = (p.correctCol * pieceW_scaled) + 'px';
                        el.style.top = (p.correctRow * pieceH_scaled) + 'px';
                    } else {
                        el.style.left = (p.currentBoardCol * pieceW_scaled) + 'px';
                        el.style.top = (p.currentBoardRow * pieceH_scaled) + 'px';
                    }
                } else {
                    // 2. 在備選池：維持舒適的 100% 基準大小
                    p.width = pieceW_base;
                    p.height = pieceH_base;
                    el.style.width = pieceW_base + 'px';
                    el.style.height = pieceH_base + 'px';
                    el.style.backgroundImage = `url("${imageSrc}")`;
                    el.style.backgroundSize = `${baseBoardWidth}px ${baseBoardHeight}px`;
                    el.style.backgroundPosition = `-${p.correctCol * pieceW_base}px -${p.correctRow * pieceH_base}px`;
                    
                    el.style.position = '';
                    el.style.left = '';
                    el.style.top = '';
                }
            });
        }

        // 核心：初始化拼圖遊戲
        function initPuzzle() {
            stopTimer();
            elapsedSeconds = 0;
            movesCount = 0;
            timerDisplay.innerText = "00:00";
            movesDisplay.innerText = "0";
            isPlaying = true;
            
            snappedContainer.innerHTML = '';
            piecesPool.innerHTML = '';
            pieces = [];

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const id = r * gridSize + c;
                    pieces.push({
                        id: id,
                        correctRow: r,
                        correctCol: c,
                        currentBoardRow: null, 
                        currentBoardCol: null, 
                        isSnapped: false,      
                        element: null
                    });
                }
            }

            const workspace = document.getElementById('game-workspace');
            const maxW = Math.min(workspace.clientWidth - 32, 520);
            
            const img = new Image();
            img.src = imageSrc;
            img.onload = function() {
                const ratio = img.naturalHeight / img.naturalWidth;
                let w = maxW;
                let h = maxW * ratio;
                const maxH = window.innerHeight * 0.45;
                if (h > maxH) {
                    h = maxH;
                    w = maxH / ratio;
                }

                // 基準 100% 尺寸
                const baseWidth = Math.floor(w);
                const baseHeight = Math.floor(h);

                // 套用目前 boardScale 縮放底板
                boardSize = { width: baseWidth * boardScale, height: baseHeight * boardScale };
                
                puzzleBoard.style.width = boardSize.width + 'px';
                puzzleBoard.style.height = boardSize.height + 'px';
                boardHintBg.style.backgroundImage = `url("${imageSrc}")`;
                
                updateGridHelper();

                const pieceW_base = baseWidth / gridSize;
                const pieceH_base = baseHeight / gridSize;

                pieces.forEach(p => {
                    p.width = pieceW_base;
                    p.height = pieceH_base;

                    const el = document.createElement('div');
                    el.className = 'relative rounded-md cursor-grab active:cursor-grabbing border border-slate-700/80 shadow-md select-none transition-shadow hover:shadow-lg hover:border-slate-400/50 shrink-0';
                    el.style.width = pieceW_base + 'px';
                    el.style.height = pieceH_base + 'px';
                    el.style.backgroundImage = `url("${imageSrc}")`;
                    el.style.backgroundSize = `${baseWidth}px ${baseHeight}px`;
                    el.style.backgroundPosition = `-${p.correctCol * pieceW_base}px -${p.correctRow * pieceH_base}px`;
                    el.setAttribute('data-id', p.id);

                    p.element = el;

                    setupDragAndDrop(el, p);
                });

                shufflePieces();
                playShuffleSound();
                startTimer();
            };
        }

        // 洗牌與打亂碎片
        function shufflePieces() {
            const shuffled = [...pieces];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            piecesPool.innerHTML = '';
            shuffled.forEach(p => {
                const randomRot = (Math.random() * 8 - 4).toFixed(1);
                p.element.style.transform = `rotate(${randomRot}deg)`;
                
                const wrapper = document.createElement('div');
                wrapper.className = 'p-1 shrink-0';
                wrapper.appendChild(p.element);
                piecesPool.appendChild(wrapper);
            });
        }

        // 智慧拖曳引擎
        function setupDragAndDrop(el, pieceObj) {
            let startX = 0;
            let startY = 0;
            let initialLeft = 0;
            let initialTop = 0;
            let isDragging = false;
            let originalParent = null;
            let placeholder = null;
            let fromBoard = false;
            let prevR = null;
            let prevC = null;

            el.addEventListener('mousedown', dragStart);
            el.addEventListener('touchstart', dragStart, { passive: false });

            function dragStart(e) {
                if (pieceObj.isSnapped) return; 
                
                if (e.type === 'touchstart') {
                    if (e.touches.length > 1) return;
                } else {
                    e.preventDefault();
                }

                if (!timerInterval) startTimer();

                isDragging = true;
                originalParent = el.parentElement;

                fromBoard = (pieceObj.currentBoardRow !== null && pieceObj.currentBoardCol !== null);
                if (fromBoard) {
                    prevR = pieceObj.currentBoardRow;
                    prevC = pieceObj.currentBoardCol;
                    pieceObj.currentBoardRow = null;
                    pieceObj.currentBoardCol = null;
                }

                el.style.transform = 'none';

                const rect = el.getBoundingClientRect();
                
                if (!fromBoard) {
                    placeholder = document.createElement('div');
                    placeholder.style.width = el.style.width;
                    placeholder.style.height = el.style.height;
                    placeholder.className = 'p-1 shrink-0 bg-slate-900/10 rounded-md border border-dashed border-slate-800/30';
                    originalParent.appendChild(placeholder);
                }

                document.body.appendChild(el);
                el.style.position = 'fixed';
                el.style.left = rect.left + 'px';
                el.style.top = rect.top + 'px';
                el.style.margin = '0';
                el.classList.add('puzzle-piece-active');

                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                startX = clientX;
                startY = clientY;
                initialLeft = rect.left;
                initialTop = rect.top;

                if (e.type === 'touchstart') {
                    document.addEventListener('touchmove', dragMove, { passive: false });
                    document.addEventListener('touchend', dragEnd);
                } else {
                    document.addEventListener('mousemove', dragMove);
                    document.addEventListener('mouseup', dragEnd);
                }
            }

            function dragMove(e) {
                if (!isDragging) return;
                if (e.type === 'touchmove') e.preventDefault();

                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

                const dx = clientX - startX;
                const dy = clientY - startY;

                el.style.left = (initialLeft + dx) + 'px';
                el.style.top = (initialTop + dy) + 'px';

                // 偵測是否懸停於目標板面之上 (即使板面具有內部捲動軸，getBoundingClientRect 依然能抓到準確視窗絕對座標)
                const boardRect = puzzleBoard.getBoundingClientRect();
                const currentLeft = parseFloat(el.style.left);
                const currentTop = parseFloat(el.style.top);
                const centerX = currentLeft + pieceObj.width / 2;
                const centerY = currentTop + pieceObj.height / 2;

                const isOver = (
                    centerX >= boardRect.left &&
                    centerX <= boardRect.right &&
                    centerY >= boardRect.top &&
                    centerY <= boardRect.bottom
                );

                if (isOver) {
                    el.classList.add('ring-2', 'ring-teal-400/80');
                } else {
                    el.classList.remove('ring-2', 'ring-teal-400/80');
                }
            }

            function dragEnd(e) {
                if (!isDragging) return;
                isDragging = false;

                if (e.type === 'touchend') {
                    document.removeEventListener('touchmove', dragMove);
                    document.removeEventListener('touchend', dragEnd);
                } else {
                    document.removeEventListener('mousemove', dragMove);
                    document.removeEventListener('mouseup', dragEnd);
                }

                el.classList.remove('puzzle-piece-active', 'ring-2', 'ring-teal-400/80');

                const boardRect = puzzleBoard.getBoundingClientRect();
                const currentLeft = parseFloat(el.style.left);
                const currentTop = parseFloat(el.style.top);
                const centerX = currentLeft + pieceObj.width / 2;
                const centerY = currentTop + pieceObj.height / 2;

                const isOverBoard = (
                    centerX >= boardRect.left &&
                    centerX <= boardRect.right &&
                    centerY >= boardRect.top &&
                    centerY <= boardRect.bottom
                );

                movesCount++;
                movesDisplay.innerText = movesCount;

                const pieceW_scaled = boardSize.width / gridSize;
                const pieceH_scaled = boardSize.height / gridSize;

                if (isOverBoard) {
                    // === 1. 拖曳並對位到網格上 ===
                    const localX = centerX - boardRect.left;
                    const localY = centerY - boardRect.top;
                    
                    let targetC = Math.floor(localX / pieceW_scaled);
                    let targetR = Math.floor(localY / pieceH_scaled);
                    targetC = Math.max(0, Math.min(gridSize - 1, targetC));
                    targetR = Math.max(0, Math.min(gridSize - 1, targetR));

                    const lockedPiece = pieces.find(p => p.isSnapped && p.correctRow === targetR && p.correctCol === targetC);
                    if (lockedPiece) {
                        bounceBack();
                        return;
                    }

                    const occupyingPiece = pieces.find(p => !p.isSnapped && p.currentBoardRow === targetR && p.currentBoardCol === targetC);

                    if (occupyingPiece) {
                        // === 交換（Swap）位置 ===
                        if (fromBoard) {
                            occupyingPiece.currentBoardRow = prevR;
                            occupyingPiece.currentBoardCol = prevC;
                            
                            const otherEl = occupyingPiece.element;
                            otherEl.style.left = (prevC * pieceW_scaled) + 'px';
                            otherEl.style.top = (prevR * pieceH_scaled) + 'px';
                            
                            if (occupyingPiece.correctRow === prevR && occupyingPiece.correctCol === prevC) {
                                lockPiece(occupyingPiece);
                            }
                        } else {
                            movePieceToPoolDirect(occupyingPiece, originalParent);
                        }
                    }

                    // 擺放拖曳物到目標網格
                    pieceObj.currentBoardRow = targetR;
                    pieceObj.currentBoardCol = targetC;
                    pieceObj.width = pieceW_scaled;
                    pieceObj.height = pieceH_scaled;
                    
                    snappedContainer.appendChild(el);
                    el.style.position = 'absolute';
                    el.style.width = pieceW_scaled + 'px';
                    el.style.height = pieceH_scaled + 'px';
                    el.style.backgroundSize = `${boardSize.width}px ${boardSize.height}px`;
                    el.style.backgroundPosition = `-${pieceObj.correctCol * pieceW_scaled}px -${pieceObj.correctRow * pieceH_scaled}px`;
                    el.style.left = (targetC * pieceW_scaled) + 'px';
                    el.style.top = (targetR * pieceH_scaled) + 'px';

                    if (placeholder && placeholder.parentElement) {
                        placeholder.remove();
                    }

                    if (targetR === pieceObj.correctRow && targetC === pieceObj.correctCol) {
                        lockPiece(pieceObj);
                    } else {
                        playPlaceSound();
                    }

                } else {
                    // === 2. 拖曳到底板外面 (退回碎片池) ===
                    if (fromBoard) {
                        movePieceToPoolDirect(pieceObj);
                    } else {
                        bounceBack();
                    }
                }
            }

            // 彈回原位
            function bounceBack() {
                const pieceW_scaled = boardSize.width / gridSize;
                const pieceH_scaled = boardSize.height / gridSize;

                if (fromBoard) {
                    pieceObj.currentBoardRow = prevR;
                    pieceObj.currentBoardCol = prevC;
                    pieceObj.width = pieceW_scaled;
                    pieceObj.height = pieceH_scaled;
                    
                    snappedContainer.appendChild(el);
                    el.style.position = 'absolute';
                    
                    el.animate([
                        { left: el.style.left, top: el.style.top },
                        { left: (prevC * pieceW_scaled) + 'px', top: (prevR * pieceH_scaled) + 'px' }
                    ], {
                        duration: 200,
                        easing: 'ease-out'
                    }).onfinish = () => {
                        el.style.left = (prevC * pieceW_scaled) + 'px';
                        el.style.top = (prevR * pieceH_scaled) + 'px';
                    };
                } else {
                    const placeholderRect = placeholder.getBoundingClientRect();
                    el.animate([
                        { left: el.style.left, top: el.style.top },
                        { left: placeholderRect.left + 'px', top: placeholderRect.top + 'px' }
                    ], {
                        duration: 250,
                        easing: 'cubic-bezier(0.25, 1, 0.5, 1)'
                    }).onfinish = () => {
                        originalParent.appendChild(el);
                        el.style.position = '';
                        el.style.left = '';
                        el.style.top = '';
                        
                        const randomRot = (Math.random() * 8 - 4).toFixed(1);
                        el.style.transform = `rotate(${randomRot}deg)`;
                        
                        if (placeholder && placeholder.parentElement) {
                            placeholder.remove();
                        }
                    };
                }
            }
        }

        // 移動碎片到下方碎片池 (還原 100% 原始大小)
        function movePieceToPoolDirect(piece, wrapper = null) {
            piece.currentBoardRow = null;
            piece.currentBoardCol = null;
            piece.isSnapped = false;
            
            const baseBoardWidth = boardSize.width / boardScale;
            const baseBoardHeight = boardSize.height / boardScale;
            const pieceW_base = baseBoardWidth / gridSize;
            const pieceH_base = baseBoardHeight / gridSize;

            piece.width = pieceW_base;
            piece.height = pieceH_base;

            const pEl = piece.element;
            pEl.style.position = '';
            pEl.style.width = pieceW_base + 'px';
            pEl.style.height = pieceH_base + 'px';
            pEl.style.backgroundImage = `url("${imageSrc}")`;
            pEl.style.backgroundSize = `${baseBoardWidth}px ${baseBoardHeight}px`;
            pEl.style.backgroundPosition = `-${piece.correctCol * pieceW_base}px -${piece.correctRow * pieceH_base}px`;
            pEl.style.left = '';
            pEl.style.top = '';
            
            const randomRot = (Math.random() * 8 - 4).toFixed(1);
            pEl.style.transform = `rotate(${randomRot}deg)`;

            if (wrapper) {
                wrapper.appendChild(pEl);
            } else {
                const newWrapper = document.createElement('div');
                newWrapper.className = 'p-1 shrink-0';
                newWrapper.appendChild(pEl);
                piecesPool.appendChild(newWrapper);
            }
            playPlaceSound();
        }

        // 鎖定拼圖
        function lockPiece(p) {
            p.isSnapped = true;
            p.currentBoardRow = null;
            p.currentBoardCol = null;
            
            const pEl = p.element;
            pEl.className = 'absolute border border-transparent select-none transition-all duration-200';
            
            playSnapSound();

            pEl.animate([
                { transform: 'scale(1.1)', filter: 'brightness(1.2)' },
                { transform: 'scale(1)', filter: 'none' }
            ], {
                duration: 200,
                easing: 'ease-out'
            });

            checkVictory();
        }

        // 計時器邏輯
        function startTimer() {
            stopTimer();
            startTime = Date.now() - elapsedSeconds * 1000;
            timerInterval = setInterval(() => {
                elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
                
                const mins = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
                const secs = String(elapsedSeconds % 60).padStart(2, '0');
                timerDisplay.innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // 檢查勝利條件
        function checkVictory() {
            const allSnapped = pieces.every(p => p.isSnapped);
            if (allSnapped) {
                stopTimer();
                isPlaying = false;
                
                playVictorySound();
                showVictory();
            }
        }

        // 展示勝利彈窗
        function showVictory() {
            modalTime.innerText = timerDisplay.innerText;
            modalMoves.innerText = movesCount;
            
            victoryModal.classList.remove('opacity-0', 'pointer-events-none');
            victoryModal.querySelector('div').classList.remove('scale-90');
            victoryModal.querySelector('div').classList.add('scale-100');

            startConfetti();
        }

        function hideVictory() {
            victoryModal.classList.add('opacity-0', 'pointer-events-none');
            victoryModal.querySelector('div').classList.add('scale-90');
            victoryModal.querySelector('div').classList.remove('scale-100');
            stopConfetti();
        }

        // 五彩碎紙紙屑特效
        let confettiInterval = null;
        function startConfetti() {
            confettiCanvas.classList.remove('hidden');
            const ctx = confettiCanvas.getContext('2d');
            let width = confettiCanvas.width = window.innerWidth;
            let height = confettiCanvas.height = window.innerHeight;

            window.addEventListener('resize', () => {
                width = confettiCanvas.width = window.innerWidth;
                height = confettiCanvas.height = window.innerHeight;
            });

            const colors = ['#2dd4bf', '#34d399', '#f59e0b', '#ec4899', '#3b82f6'];
            const particles = [];

            for (let i = 0; i < 120; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height - height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * height,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach((p, index) => {
                    p.tiltAngle += p.tiltAngleIncremental;
                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.x += Math.sin(p.tiltAngle);
                    p.tilt = Math.sin(p.tiltAngle - index / 3) * 15;

                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();

                    if (p.y > height) {
                        particles[index] = {
                            x: Math.random() * width,
                            y: -20,
                            r: p.r,
                            d: p.d,
                            color: p.color,
                            tilt: p.tilt,
                            tiltAngleIncremental: p.tiltAngleIncremental,
                            tiltAngle: p.tiltAngle
                        };
                    }
                });
            }

            function updateLoop() {
                draw();
                confettiInterval = requestAnimationFrame(updateLoop);
            }
            updateLoop();
        }

        function stopConfetti() {
            if (confettiInterval) {
                cancelAnimationFrame(confettiInterval);
                confettiInterval = null;
            }
            confettiCanvas.classList.add('hidden');
        }

        // 輔助 Toast 提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 border border-slate-700/80 text-teal-400 px-5 py-3 rounded-xl shadow-2xl text-sm font-medium z-50 transition-all transform translate-y-10 opacity-0 duration-300';
            toast.innerText = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
